<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A1D23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>靴履云仓</title>
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #F5F3F0;
  --card: #FFFFFF;
  --primary: #1A1D23;
  --accent: #E8700A;
  --accent-light: #FFF5ED;
  --success: #059669;
  --success-light: #ECFDF5;
  --danger: #DC2626;
  --danger-light: #FEF2F2;
  --warning: #D97706;
  --warning-light: #FFFBEB;
  --text: #1A1D23;
  --text-secondary: #6B7280;
  --border: #E5E7EB;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.12);
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono: "SF Mono","Cascadia Code","Consolas",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;background:var(--bg)}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:17px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.header-actions{display:flex;gap:8px}
.header-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);transition:background .15s}
.header-btn:active{background:rgba(255,255,255,.24)}
.search-bar{display:flex;flex:1;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);padding:0 12px;height:36px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;min-width:0}
.search-bar input::placeholder{color:rgba(255,255,255,.4)}
.search-bar svg{flex-shrink:0;opacity:.5}

/* Main content */
.main{padding:16px;padding-bottom:calc(80px + var(--safe-bottom))}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
.card-value{font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-.02em}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}

/* Stat row */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-row.three{grid-template-columns:1fr 1fr 1fr}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-card .stat-value{font-size:22px;font-weight:700;font-family:var(--font-mono)}
.stat-card .stat-label{font-size:12px;color:var(--text-secondary);margin-top:2px}
.stat-card .stat-trend{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}

/* Icon backgrounds */
.icon-in{background:#ECFDF5;color:var(--success)}
.icon-out{background:#FEF2F2;color:var(--danger)}
.icon-store{background:#FFF5ED;color:var(--accent)}
.icon-warn{background:#FFFBEB;color:var(--warning)}

/* Alert row */
.alert-item{display:flex;align-items:center;padding:12px;background:var(--warning-light);border-radius:var(--radius-sm);margin-bottom:8px;gap:10px}
.alert-item .alert-dot{width:8px;height:8px;border-radius:50%;background:var(--warning);flex-shrink:0}
.alert-item .alert-info{flex:1;min-width:0}
.alert-item .alert-name{font-size:14px;font-weight:500}
.alert-item .alert-meta{font-size:12px;color:var(--text-secondary)}
.alert-item .alert-stock{font-size:14px;font-weight:600;color:var(--warning)}

/* List items */
.list-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;transition:background .1s}
.list-item:active{background:rgba(0,0,0,.02);margin:0 -16px;padding:14px 16px}
.list-item:last-child{border-bottom:none}
.list-thumb{width:48px;height:48px;border-radius:var(--radius-sm);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.list-thumb img{width:100%;height:100%;object-fit:cover}
.list-info{flex:1;min-width:0}
.list-name{font-size:15px;font-weight:500;line-height:1.3}
.list-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;display:flex;gap:8px}
.list-right{text-align:right;flex-shrink:0}
.list-right .count{font-size:16px;font-weight:600;font-family:var(--font-mono)}
.list-right .sub{font-size:11px;color:var(--text-secondary)}
.list-right .in{color:var(--success)}
.list-right .out{color:var(--danger)}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:var(--text-secondary)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.empty .btn{margin-top:16px}

/* Bottom nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;font-size:10px;color:var(--text-secondary);gap:3px;transition:color .15s;position:relative}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}

/* FAB */
.fab{position:fixed;bottom:calc(64px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:101;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,112,10,.4)}
.fab:active{transform:translateX(-50%) scale(.95)}
.fab-menu{position:fixed;bottom:calc(120px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;opacity:0;transition:opacity .2s}
.fab-menu.open{pointer-events:auto;opacity:1}
.fab-menu-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:32px;padding:10px 18px 10px 10px;box-shadow:var(--shadow-md);cursor:pointer;white-space:nowrap}
.fab-menu-item .fab-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.fab-menu-item .fab-label{font-size:13px;font-weight:500}
.fab-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:98;opacity:0;pointer-events:none;transition:opacity .2s}
.fab-overlay.open{opacity:1;pointer-events:auto}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#d06509}
.btn-secondary{background:var(--bg);color:var(--text)}
.btn-secondary:active{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:6px}
.btn-block{display:flex;width:100%}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:90dvh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:17px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.modal-body{overflow-y:auto;padding:16px;flex:1}
.modal-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.modal-footer .btn{flex:1}

/* Form */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.form-label .req{color:var(--danger)}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--accent);background:var(--card)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-textarea{min-height:80px;resize:vertical}
.photo-pick{width:100%;height:120px;border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text-secondary);cursor:pointer;transition:border-color .15s;overflow:hidden;position:relative}
.photo-pick:active{border-color:var(--accent)}
.photo-pick img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-pick.has-photo{border-style:solid}
.photo-pick .photo-remove{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;z-index:1;font-size:14px}

/* Tags/Chips */
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-in{background:var(--success-light);color:var(--success)}
.tag-out{background:var(--danger-light);color:var(--danger)}
.tag-warn{background:var(--warning-light);color:var(--warning)}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:300;background:var(--primary);color:#fff;padding:12px 20px;border-radius:32px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);transition:transform .3s ease;pointer-events:none;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}

/* Confirm dialog */
.confirm-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
.confirm-overlay.open{opacity:1;pointer-events:auto}
.confirm-box{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-actions .btn{flex:1}

/* Product detail */
.detail-header{position:relative;background:var(--primary);padding:24px 16px 32px;color:#fff}
.detail-header .back-btn{position:absolute;top:12px;left:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
.detail-photo{width:80px;height:80px;border-radius:var(--radius-sm);background:rgba(255,255,255,.1);margin-bottom:12px;overflow:hidden}
.detail-name{font-size:20px;font-weight:600;margin-bottom:4px}
.detail-sku{font-size:13px;opacity:.6}
.detail-stock{font-size:36px;font-weight:700;font-family:var(--font-mono);margin-top:12px}
.detail-meta-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.detail-body{padding:16px}
.detail-section{margin-bottom:20px}
.detail-section h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.detail-field{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-field:last-child{border-bottom:none}
.detail-field .key{color:var(--text-secondary)}
.detail-field .val{font-weight:500}

/* Settings card */
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer}
.setting-item:last-child{border-bottom:none}
.setting-item .setting-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.setting-item .setting-info{flex:1;min-width:0}
.setting-item .setting-name{font-size:14px;font-weight:500}
.setting-item .setting-desc{font-size:12px;color:var(--text-secondary);margin-top:1px}
.setting-item .setting-arrow{color:var(--text-secondary);flex-shrink:0}
.setting-section{margin-bottom:20px}
.setting-section h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;padding:0 4px}

/* File input */
.file-input{display:none}

/* Pulsing dot animation */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease infinite}

/* Scrollbar */
::-webkit-scrollbar{width:0}

/* Uitlity */
.flex-center{display:flex;align-items:center;justify-content:center}
.text-secondary{color:var(--text-secondary)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.mt-2{margin-top:8px}
.mb-2{margin-bottom:8px}
.gap-1{gap:4px}
.gap-2{gap:8px}

@media (min-width:481px){
  .modal{border-radius:var(--radius);max-height:80dvh}
}
</style>
</head>

<!-- Header -->

  <div class="search-bar" id="searchBar" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>

    <span>设置</span>

</nav>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="快捷操作">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>
<div class="fab-menu" id="fabMenu">
  <button class="fab-menu-item" data-action="inbound">
    <span class="fab-icon" style="background:#ECFDF5;color:var(--success)">↓</span>
    <span class="fab-label">入库</span>
  </button>
  <button class="fab-menu-item" data-action="outbound">
    <span class="fab-icon" style="background:#FEF2F2;color:var(--danger)">↑</span>
    <span class="fab-label">出库</span>

</div>
<div class="fab-overlay" id="fabOverlay"></div>

<!-- Modal container -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <h2 id="modalTitle">标题</h2>
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3 id="confirmTitle">确认操作</h3>
    <p id="confirmMsg">确定要执行此操作吗？</p>
    <div class="confirm-actions">
      <button class="btn btn-secondary" id="confirmCancel">取消</button>
      <button class="btn btn-danger" id="confirmOK">确认</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" class="file-input" id="excelFileInput" accept=".xlsx,.xls,.csv">

<script>
// ============ IndexedDB Layer ============
const DB_NAME = 'ShoeWarehouseDB';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('products')) {
        const ps = d.createObjectStore('products', { keyPath: 'id', autoIncrement: true });
        ps.createIndex('sku', 'sku', { unique: true });
        ps.createIndex('category', 'category');
        ps.createIndex('name', 'name');
      }
      if (!d.objectStoreNames.contains('transactions')) {
        const ts = d.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
        ts.createIndex('productId', 'productId');
        ts.createIndex('type', 'type');
        ts.createIndex('createdAt', 'createdAt');
      }
      if (!d.objectStoreNames.contains('categories')) {
        const cs = d.createObjectStore('categories', { keyPath: 'id', autoIncrement: true });
        cs.createIndex('name', 'name', { unique: true });
      }
      if (!d.objectStoreNames.contains('suppliers')) {
        const ss = d.createObjectStore('suppliers', { keyPath: 'id', autoIncrement: true });
        ss.createIndex('name', 'name', { unique: true });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ============ Service Worker Registration ============
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'shoe-warehouse-v1';
const URLS = ['/'];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(URLS)).then(() => self.skipWaiting()));
});

self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim()));
});

self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    if (res.ok) { const clone = res.clone(); caches.open(CACHE).then(c => c.put(e.request, clone)); }
    return res;
  })));
});
`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}

// ============ Helpers ============
const $ = (sel, ctx) => (ctx || document).querySelector(sel);
const $$ = (sel, ctx) => (ctx || document).querySelectorAll(sel);
const el = (tag, attrs = {}, html = '') => {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => { if (k === 'className') e.className = v; else if (k.startsWith('on')) e.addEventListener(k.slice(2), v); else e.setAttribute(k, v); });
  if (html) e.innerHTML = html;
  return e;
};

function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function fmtDateShort(ts) {
  const d = new Date(ts);
  return `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg, type = '') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.classList.remove('show'); }, 2200);
}

function confirm(msg, title = '确认操作') {
  return new Promise(resolve => {
    $('#confirmTitle').textContent = title;
    $('#confirmMsg').textContent = msg;
    const ov = $('#confirmOverlay');
    ov.classList.add('open');
    const cleanup = (val) => {
      ov.classList.remove('open');
      $('#confirmOK').removeEventListener('click', onOk);
      $('#confirmCancel').removeEventListener('click', onCancel);
      resolve(val);
    };
    const onOk = () => cleanup(true);
    const onCancel = () => cleanup(false);
    $('#confirmOK').addEventListener('click', onOk);
    $('#confirmCancel').addEventListener('click', onCancel);
  });
}

// ============ Products ============
async function renderProducts({ search, filter } = {}) {
  const main = $('#mainContent');
  let products = await dbGetAll('products');
  const st = await dbGetAll('settings');
  const lowStockThreshold = parseInt(st.find(s => s.key === 'lowStockThreshold')?.value || '10');

  if (search) {
    const q = search.toLowerCase();
    products = products.filter(p => (p.name || '').toLowerCase().includes(q) || (p.sku || '').toLowerCase().includes(q) || (p.brand || '').toLowerCase().includes(q));
    $('#searchInput').value = search;
  }
  if (filter === 'low') {
    products = products.filter(p => (p.stock || 0) <= lowStockThreshold);
  }

  products.sort((a, b) => a.name.localeCompare(b.name, 'zh'));

  if (products.length === 0) {
    main.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <h3>${search ? '未找到匹配商品' : '还没有商品'}</h3>
        <p>${search ? '试试其他关键词' : '点击下方 + 按钮添加第一个商品'}</p>
        ${!search ? '<button class="btn btn-primary" onclick="showProductForm()">添加商品</button>' : ''}
      </div>
    `;
    return;
  }

  main.innerHTML = products.map(p => {
    const low = (p.stock || 0) <= lowStockThreshold;
    return `<div class="list-item" onclick="showProductDetail(${p.id})">
      <div class="list-thumb">
        ${p.photo ? `<img src="${p.photo}" alt="">` : '<span>👟</span>'}

      <div class="list-info">
        <div class="list-name">${escHtml(p.name)}${low ? ' <span class="tag tag-warn" style="margin-left:6px">低库存</span>' : ''}</div>
        <div class="list-meta">${p.sku || '无SKU'} · ${p.category || '未分类'} · ${p.size || ''}${p.color ? ' · ' + p.color : ''}</div>

        <div class="sub">${p.location || ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ============ Transactions ============
async function renderTransactions({ productId } = {}) {
  const main = $('#mainContent');
  let transactions = await dbGetAll('transactions');
  const products = await dbGetAll('products');

  if (productId) {
    transactions = transactions.filter(t => t.productId === productId);
  }

  transactions.sort((a, b) => b.createdAt - a.createdAt);

  main.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm btn-secondary filter-btn active" data-filter="all">全部</button>
      <button class="btn btn-sm btn-secondary filter-btn" data-filter="in">入库</button>
      <button class="btn btn-sm btn-secondary filter-btn" data-filter="out">出库</button>
    </div>
    <div id="txList"></div>
  `;

  let activeFilter = 'all';

  function renderList() {
    let filtered = transactions;
    if (activeFilter === 'in') filtered = transactions.filter(t => t.type === 'in');
    else if (activeFilter === 'out') filtered = transactions.filter(t => t.type === 'out');

    const list = $('#txList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>暂无记录</p></div>';
      return;
    }
    list.innerHTML = filtered.map(t => {
      const p = products.find(x => x.id === t.productId);
      const isIn = t.type === 'in';
      return `<div class="list-item" onclick="showTransactionDetail(${t.id})">
        <div class="list-thumb" style="font-size:18px">${isIn ? '📥' : '📤'}</div>
        <div class="list-info">
          <div class="list-name">${escHtml(p?.name || '已删除商品')}</div>
          <div class="list-meta">${fmtDate(t.createdAt)} · ${t.supplier || t.destination || ''}</div>
        </div>
        <div class="list-right">
          <div class="count ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${t.quantity}</div>
          <div class="sub">${t.sku || ''}</div>
        </div>
      </div>`;
    }).join('');
  }

  renderList();

  $$('.filter-btn', main).forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn', main).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderList();
    });
  });
}

async function showTransactionForm(type, presetProductId = null) {
  const products = await dbGetAll('products');
  const suppliers = await dbGetAll('suppliers');

  const isIn = type === 'in';
  const title = isIn ? '入库' : '出库';
  const btnLabel = isIn ? '确认入库' : '确认出库';

  openModal(title, `
    <div class="form-group">
      <label class="form-label"><span class="req">*</span> 选择商品</label>
      <select class="form-input" id="tfProduct">
        <option value="">请选择商品</option>
        ${products.map(p => `<option value="${p.id}" ${p.id === presetProductId ? 'selected' : ''}>${escHtml(p.name)} (${p.sku || '无SKU'} · 库存${p.stock || 0})</option>`).join('')}
      </select>
      ${!isIn ? '<p style="font-size:11px;color:var(--text-secondary);margin-top:4px">当前库存将自动显示</p>' : ''}
    </div>
    <div class="form-group">
      <label class="form-label"><span class="req">*</span> 数量</label>
      <input class="form-input" id="tfQty" type="number" min="1" placeholder="请输入数量（双）">
    </div>
    <div class="form-group">
      <label class="form-label">${isIn ? '供应商/来源' : '去向/客户'}</label>
      ${isIn ? `
        <select class="form-input" id="tfSupplier">
          <option value="">请选择（可选）</option>
          ${suppliers.map(s => `<option value="${escHtml(s.name)}">${escHtml(s.name)}</option>`).join('')}
          <option value="__custom__">其他（手动输入）</option>
        </select>
        <input class="form-input" id="tfSupplierCustom" style="display:none;margin-top:8px" placeholder="请输入供应商名称">
      ` : `
        <input class="form-input" id="tfDestination" placeholder="例如：零售客户、批发等">
      `}
    </div>
    <div class="form-group">
      <label class="form-label">留档照片</label>
      <div class="photo-pick" id="tfPhoto" onclick="document.getElementById('tfPhotoInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span style="font-size:13px">点击拍照留档</span>
      </div>
      <input type="file" id="tfPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoPick(this, 'tfPhoto', 'tfPhotoData')">
      <textarea id="tfPhotoData" style="display:none"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="form-input form-textarea" id="tfNote" placeholder="补充说明…"></textarea>
    </div>
    <div class="card" style="background:${isIn ? 'var(--success-light)' : 'var(--danger-light)'};margin-bottom:0">
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">${isIn ? '操作后库存将增加' : '操作后库存将减少'}</div>
      <div style="font-size:13px">${isIn ? '入库数量将自动累加到当前库存' : '请确认库存充足后再操作出库'}</div>
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" id="tfSaveBtn" style="background:${isIn ? 'var(--success)' : 'var(--danger)'}">${btnLabel}</button>
  `);

  if (isIn) {
    const supSelect = $('#tfSupplier');
    const supCustom = $('#tfSupplierCustom');
    supSelect.addEventListener('change', () => {
      if (supSelect.value === '__custom__') {
        supCustom.style.display = 'block';
        supCustom.focus();
      } else {
        supCustom.style.display = 'none';
      }
    });
  }

  $('#tfSaveBtn').addEventListener('click', async () => {
    const productId = parseInt($('#tfProduct').value);
    const qty = parseInt($('#tfQty').value);
    if (!productId) { showToast('请选择商品'); return; }
    if (!qty || qty <= 0) { showToast('请输入有效数量'); return; }

    const product = await dbGet('products', productId);
    if (!product) { showToast('商品不存在'); return; }

    if (!isIn && (product.stock || 0) < qty) {
      showToast('库存不足，当前库存：' + (product.stock || 0));
      return;
    }

    const supplier = isIn ? ($('#tfSupplier').value === '__custom__' ? $('#tfSupplierCustom').value.trim() : $('#tfSupplier').value) : '';
    const destination = !isIn ? $('#tfDestination').value.trim() : '';

    const tx = {
      productId,
      sku: product.sku,
      type: isIn ? 'in' : 'out',
      quantity: qty,
      supplier: supplier || null,
      destination: isIn ? null : (destination || null),
      photo: $('#tfPhotoData').value || null,
      note: $('#tfNote').value.trim() || null,
      createdAt: Date.now()
    };

    product.stock = (product.stock || 0) + (isIn ? qty : -qty);
    product.updatedAt = Date.now();

    const txDB = db.transaction(['transactions', 'products'], 'readwrite');
    const txStore = txDB.objectStore('transactions');
    const pStore = txDB.objectStore('products');
    txStore.add(tx);
    pStore.put(product);

    txDB.oncomplete = () => {
      closeModal();
      showToast(`${isIn ? '入库' : '出库'}成功`, 'success');
      if (currentPage === 'dashboard') renderDashboard();
      else if (currentPage === 'transactions') renderTransactions({});
      else if (currentPage === 'products') renderProducts({});
    };
    txDB.onerror = () => { showToast('操作失败'); };
  });
}

async function saveThreshold() {

    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" onclick="saveSupplier(${id})">保存</button>
  `);
}

async function deleteSupplier(id, name) {
  const ok = await confirm(`确定删除供应商「${name}」吗？`, '删除供应商');
  if (!ok) return;
  await dbDelete('suppliers', id);
  showToast('已删除', 'success');
  renderSettings();
}

// ============ Excel Export ============
async function exportExcel() {
  const products = await dbGetAll('products');
  const transactions = await dbGetAll('transactions');

  if (products.length === 0 && transactions.length === 0) {
    showToast('暂无数据可导出');
    return;
  }

  const wb = XLSX.utils.book_new();

  const pData = products.map(p => ({
    'SKU': p.sku || '',
    '商品名称': p.name || '',
    '品牌': p.brand || '',
    '尺码': p.size || '',
    '颜色': p.color || '',
    '分类': p.category || '',
    '供应商': p.supplier || '',
    '库存': p.stock || 0,
    '最低库存': p.minStock || '',
    '成本价': p.cost || '',
    '零售价': p.price || '',
    '库位': p.location || '',
    '备注': p.note || '',
    '创建时间': p.createdAt ? fmtDate(p.createdAt) : '',
    '更新时间': p.updatedAt ? fmtDate(p.updatedAt) : ''
  }));
  if (pData.length > 0) {
    const pws = XLSX.utils.json_to_sheet(pData);
    const pcols = Object.keys(pData[0]).map((k, i) => ({ wch: Math.max(k.length * 2, 12) }));
    pws['!cols'] = pcols;
    XLSX.utils.book_append_sheet(wb, pws, '商品列表');
  }

  const tData = transactions.map(t => {
    const p = products.find(x => x.id === t.productId);
    return {
      '类型': t.type === 'in' ? '入库' : '出库',
      '商品名称': p?.name || '',
      'SKU': t.sku || '',
      '数量': t.quantity,
      '供应商/去向': t.supplier || t.destination || '',
      '备注': t.note || '',
      '时间': fmtDate(t.createdAt)
    };
  });
  if (tData.length > 0) {
    const tws = XLSX.utils.json_to_sheet(tData);
    const tcols = Object.keys(tData[0]).map((k, i) => ({ wch: Math.max(k.length * 2, 12) }));
    tws['!cols'] = tcols;
    XLSX.utils.book_append_sheet(wb, tws, '出入库记录');
  }

  XLSX.writeFile(wb, `靴履云仓_数据导出_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('导出成功', 'success');
}

// ============ Excel Import ============

    <div class="card" style="background:var(--warning-light);margin-bottom:12px">

      <div style="font-size:12px;line-height:1.5">- 第一行将被视为表头<br>- SKU重复的记录将被跳过<br>- 库存列如不填则默认为0</div>
    </div>

$('#excelFileInput').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  this.value = '';

  try {
    const data = await readFileAsBuffer(file);
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws);
    if (rows.length === 0) { showToast('文件中没有数据'); return; }

    let imported = 0;
    let skipped = 0;
    const errors = [];

    for (const row of rows) {
      const name = (row['商品名称'] || row['名称'] || '').toString().trim();
      const sku = (row['SKU'] || row['sku'] || row['货号'] || '').toString().trim();
      if (!name || !sku) { skipped++; errors.push(`缺少商品名称或SKU (行数据: ${JSON.stringify(row).slice(0,60)})`); continue; }

      const existing = await dbGetByIndex('products', 'sku', sku);
      if (existing.length > 0) { skipped++; continue; }

      await dbPut('products', {
        name,
        sku,
        brand: (row['品牌'] || '').toString().trim(),
        size: (row['尺码'] || '').toString().trim(),
        color: (row['颜色'] || '').toString().trim(),
        category: (row['分类'] || '').toString().trim(),
        supplier: (row['供应商'] || '').toString().trim(),
        stock: parseInt(row['库存']) || 0,
        cost: parseFloat(row['成本价']) || null,
        price: parseFloat(row['零售价']) || null,
        location: (row['库位'] || '').toString().trim(),
        note: (row['备注'] || '').toString().trim(),
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
      imported++;
    }

    const resultDiv = $('#importResult');
    resultDiv.innerHTML = `
      <div class="card" style="background:${imported > 0 ? 'var(--success-light)' : 'var(--warning-light)'}">
        <div style="font-size:14px;font-weight:500">导入完成</div>
        <div style="font-size:13px;color:var(--text-secondary);margin-top:4px">成功导入 <b>${imported}</b> 条，跳过 <b>${skipped}</b> 条</div>
        ${errors.slice(0, 3).map(e => `<div style="font-size:11px;color:var(--danger);margin-top:4px">${e}</div>`).join('')}
      </div>
    `;
    if (imported > 0) {
      showToast(`成功导入 ${imported} 条商品`, 'success');
      if (currentPage === 'products') renderProducts({});
      if (currentPage === 'dashboard') renderDashboard();
    }
  } catch (err) {
    showToast('读取文件失败：' + err.message);
  }
});

function readFileAsBuffer(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(new Uint8Array(reader.result));
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// ============ Backup & Restore ============
async function exportBackup() {
  const data = {
    version: '1.0',
    exportedAt: Date.now(),
    products: await dbGetAll('products'),
    transactions: await dbGetAll('transactions'),
    categories: await dbGetAll('categories'),
    suppliers: await dbGetAll('suppliers'),
    settings: await dbGetAll('settings')
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `靴履云仓_备份_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('备份已下载', 'success');
}

async function restoreBackup() {
  const ok = await confirm('恢复备份将覆盖当前所有数据（商品、记录、分类、供应商、设置）。此操作不可撤销，建议先导出备份。', '恢复备份');
  if (!ok) return;

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async function() {
    const file = this.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      if (!data.products || !data.transactions) { showToast('备份文件格式不正确'); return; }

      await dbClear('products');
      await dbClear('transactions');
      await dbClear('categories');
      await dbClear('suppliers');
      await dbClear('settings');

      const tx = db.transaction(['products', 'transactions', 'categories', 'suppliers', 'settings'], 'readwrite');
      for (const p of data.products) tx.objectStore('products').put(p);
      for (const t of data.transactions) tx.objectStore('transactions').put(t);
      for (const c of (data.categories || [])) tx.objectStore('categories').put(c);
      for (const s of (data.suppliers || [])) tx.objectStore('suppliers').put(s);
      for (const s of (data.settings || [])) tx.objectStore('settings').put(s);

      tx.oncomplete = () => {
        showToast('数据已恢复', 'success');
        navigateTo('dashboard');
      };
      tx.onerror = () => showToast('恢复失败');
    } catch (err) {
      showToast('读取备份文件失败：' + err.message);
    }
  };
  input.click();
}

// ============ Photo handling ============
function handlePhotoPick(input, pickerId, dataId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result;
    $(`#${dataId}`).value = base64;
    const picker = $(`#${pickerId}`);
    picker.classList.add('has-photo');
    picker.innerHTML = `<img src="${base64}" alt=""><span class="photo-remove" onclick="event.stopPropagation();clearPhoto('${pickerId}','${dataId}')">✕</span>`;
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function clearPhoto(pickerId, dataId) {
  $(`#${dataId}`).value = '';
  const picker = $(`#${pickerId}`);
  picker.classList.remove('has-photo');
  picker.innerHTML = `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:13px">点击拍照或选择图片</span>`;
}

// ============ HTML escape ============
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
