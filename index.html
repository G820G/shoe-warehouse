<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A1D23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="靴履云仓">
<title>靴履云仓</title>
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
<style>
:root {
  --bg: #F5F3F0;
  --card: #FFFFFF;
  --primary: #1A1D23;
  --accent: #E8700A;
  --accent-light: #FFF5ED;
  --success: #059669;
  --success-light: #ECFDF5;
  --danger: #DC2626;
  --danger-light: #FEF2F2;
  --warning: #D97706;
  --warning-light: #FFFBEB;
  --text: #1A1D23;
  --text-secondary: #6B7280;
  --border: #E5E7EB;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.12);
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --font: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
  --font-mono: "SF Mono","Cascadia Code","Consolas",monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-family:var(--font);font-size:15px;color:var(--text);background:var(--bg);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{max-width:480px;margin:0 auto;min-height:100dvh;position:relative;background:var(--bg)}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit;color:inherit}
img{max-width:100%;display:block}

.header{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.header h1{font-size:17px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.header-actions{display:flex;gap:8px}
.header-btn{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);transition:background .15s}
.header-btn:active{background:rgba(255,255,255,.24)}
.search-bar{display:flex;flex:1;align-items:center;gap:8px;background:rgba(255,255,255,.15);border-radius:var(--radius-sm);padding:0 12px;height:36px}
.search-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:14px;min-width:0}
.search-bar input::placeholder{color:rgba(255,255,255,.4)}
.search-bar svg{flex-shrink:0;opacity:.5}

.main{padding:16px;padding-bottom:calc(80px + var(--safe-bottom))}

.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em}
.card-value{font-size:28px;font-weight:700;font-family:var(--font-mono);letter-spacing:-.02em}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-row.three{grid-template-columns:1fr 1fr 1fr}
.stat-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.stat-card .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-card .stat-value{font-size:22px;font-weight:700;font-family:var(--font-mono)}
.stat-card .stat-label{font-size:12px;color:var(--text-secondary);margin-top:2px}
.stat-card .stat-trend{font-size:11px;margin-top:4px;display:flex;align-items:center;gap:3px}

.icon-in{background:#ECFDF5;color:var(--success)}
.icon-out{background:#FEF2F2;color:var(--danger)}
.icon-store{background:#FFF5ED;color:var(--accent)}
.icon-warn{background:#FFFBEB;color:var(--warning)}

.install-banner{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;border-radius:var(--radius);box-shadow:var(--shadow-md);display:none}
.install-banner.show{display:flex}
.install-banner p{font-size:13px;line-height:1.4;flex:1;min-width:0}
.install-banner .btn{border:2px solid #fff;color:#fff;background:transparent;font-weight:600;flex-shrink:0}

.alert-item{display:flex;align-items:center;padding:12px;background:var(--warning-light);border-radius:var(--radius-sm);margin-bottom:8px;gap:10px;cursor:pointer}
.alert-item:active{background:#fef3c7}
.alert-item .alert-dot{width:8px;height:8px;border-radius:50%;background:var(--warning);flex-shrink:0}
.alert-item .alert-info{flex:1;min-width:0}
.alert-item .alert-name{font-size:14px;font-weight:500}
.alert-item .alert-meta{font-size:12px;color:var(--text-secondary)}
.alert-item .alert-stock{font-size:14px;font-weight:600;color:var(--warning)}

.list-item{display:flex;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;transition:background .1s}
.list-item:active{background:rgba(0,0,0,.02);margin:0 -16px;padding:14px 16px}
.list-item:last-child{border-bottom:none}
.list-thumb{width:48px;height:48px;border-radius:var(--radius-sm);background:var(--bg);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.list-thumb img{width:100%;height:100%;object-fit:cover}
.list-info{flex:1;min-width:0}
.list-name{font-size:15px;font-weight:500;line-height:1.3}
.list-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.list-right{text-align:right;flex-shrink:0}
.list-right .count{font-size:16px;font-weight:600;font-family:var(--font-mono)}
.list-right .sub{font-size:11px;color:var(--text-secondary)}
.list-right .in{color:var(--success)}
.list-right .out{color:var(--danger)}

.empty{text-align:center;padding:48px 24px;color:var(--text-secondary)}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13px;line-height:1.5}
.empty .btn{margin-top:16px}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:var(--safe-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 6px;font-size:10px;color:var(--text-secondary);gap:3px;transition:color .15s;position:relative}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px}

.fab{position:fixed;bottom:calc(64px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:101;width:52px;height:52px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,112,10,.4)}
.fab:active{transform:translateX(-50%) scale(.95)}
.fab-menu{position:fixed;bottom:calc(120px + var(--safe-bottom));left:50%;transform:translateX(-50%);z-index:99;display:flex;flex-direction:column;gap:10px;align-items:center;pointer-events:none;opacity:0;transition:opacity .2s}
.fab-menu.open{pointer-events:auto;opacity:1}
.fab-menu-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:32px;padding:10px 18px 10px 10px;box-shadow:var(--shadow-md);cursor:pointer;white-space:nowrap}
.fab-menu-item .fab-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.fab-menu-item .fab-label{font-size:13px;font-weight:500}
.fab-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:98;opacity:0;pointer-events:none;transition:opacity .2s}
.fab-overlay.open{opacity:1;pointer-events:auto}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:active{background:#d06509}
.btn-secondary{background:var(--bg);color:var(--text)}
.btn-secondary:active{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:13px;border-radius:6px;font-weight:500}
.btn-block{display:flex;width:100%}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:480px;max-height:90dvh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:17px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text-secondary)}
.modal-body{overflow-y:auto;padding:16px;flex:1}
.modal-footer{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}
.modal-footer .btn{flex:1}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:6px}
.form-label .req{color:var(--danger)}
.form-input{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--bg);transition:border-color .15s;outline:none}
.form-input:focus{border-color:var(--accent);background:var(--card)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-textarea{min-height:80px;resize:vertical}
.photo-pick{width:100%;height:120px;border:2px dashed var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--text-secondary);cursor:pointer;transition:border-color .15s;overflow:hidden;position:relative}
.photo-pick:active{border-color:var(--accent)}
.photo-pick img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.photo-pick.has-photo{border-style:solid}
.photo-pick .photo-remove{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;z-index:1;font-size:14px}

.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500}
.tag-in{background:var(--success-light);color:var(--success)}
.tag-out{background:var(--danger-light);color:var(--danger)}
.tag-warn{background:var(--warning-light);color:var(--warning)}

/* Variant table */
.variant-table{width:100%;border-collapse:collapse;font-size:14px}
.variant-table th{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding:8px;text-align:left;border-bottom:2px solid var(--border)}
.variant-table td{padding:10px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.variant-table tr:last-child td{border-bottom:none}
.variant-table .v-stock{font-weight:600;font-family:var(--font-mono)}
.variant-table .v-low{color:var(--warning)}
.variant-table .v-zero{color:var(--danger)}

/* Size chips */
.size-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.size-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;background:var(--bg);border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.size-chip.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}
.size-chip .chip-stock{font-size:11px;color:var(--text-secondary);margin-left:2px}
.size-chip.selected .chip-stock{color:var(--accent)}

/* Variant picker in transaction */
.variant-picker .size-chip{min-width:56px;justify-content:center;flex-direction:column;gap:2px;padding:10px 14px}
.variant-picker .size-chip .chip-size{font-size:18px;font-weight:700;font-family:var(--font-mono)}
.variant-picker .size-chip .chip-qty{font-size:11px;color:var(--text-secondary)}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:300;background:var(--primary);color:#fff;padding:12px 20px;border-radius:32px;font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);transition:transform .3s ease;pointer-events:none;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--success)}

.confirm-overlay{position:fixed;inset:0;z-index:250;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;padding:24px}
.confirm-overlay.open{opacity:1;pointer-events:auto}
.confirm-box{background:var(--card);border-radius:var(--radius);padding:24px;width:100%;max-width:320px;text-align:center}
.confirm-box h3{font-size:16px;margin-bottom:8px}
.confirm-box p{font-size:13px;color:var(--text-secondary);margin-bottom:20px;line-height:1.5}
.confirm-actions{display:flex;gap:10px}
.confirm-actions .btn{flex:1}

.detail-header{position:relative;background:var(--primary);padding:24px 16px 32px;color:#fff}
.detail-header .back-btn{position:absolute;top:12px;left:12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center}
.detail-photo{width:80px;height:80px;border-radius:var(--radius-sm);background:rgba(255,255,255,.1);margin-bottom:12px;overflow:hidden}
.detail-name{font-size:20px;font-weight:600;margin-bottom:4px}
.detail-sku{font-size:13px;opacity:.6}
.detail-stock{font-size:36px;font-weight:700;font-family:var(--font-mono);margin-top:12px}
.detail-meta-row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.detail-body{padding:16px}
.detail-section{margin-bottom:20px}
.detail-section h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.detail-field{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
.detail-field:last-child{border-bottom:none}
.detail-field .key{color:var(--text-secondary)}
.detail-field .val{font-weight:500}

.setting-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;cursor:pointer}
.setting-item:last-child{border-bottom:none}
.setting-item .setting-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px}
.setting-item .setting-info{flex:1;min-width:0}
.setting-item .setting-name{font-size:14px;font-weight:500}
.setting-item .setting-desc{font-size:12px;color:var(--text-secondary);margin-top:1px}
.setting-item .setting-arrow{color:var(--text-secondary);flex-shrink:0}
.setting-section{margin-bottom:20px}
.setting-section h4{font-size:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;padding:0 4px}

.qty-stepper{display:inline-flex;align-items:center;gap:0;border-radius:var(--radius-sm);overflow:hidden}
.qty-stepper button{width:36px;height:36px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600}
.qty-stepper button:active{background:var(--border)}
.qty-stepper input{width:50px;height:36px;text-align:center;border:none;background:var(--card);font-size:15px;font-weight:600;font-family:var(--font-mono);-moz-appearance:textfield}
.qty-stepper input::-webkit-outer-spin-button,.qty-stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.variant-input-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)}
.variant-input-row:last-child{border-bottom:none}
.variant-input-row .vi-size{width:60px;text-align:center;font-weight:600;font-family:var(--font-mono)}

.file-input{display:none}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 2s ease infinite}

::-webkit-scrollbar{width:0}

.text-secondary{color:var(--text-secondary)}
.text-sm{font-size:13px}
.text-xs{font-size:11px}
.mt-2{margin-top:8px}
.mb-2{margin-bottom:8px}
.gap-1{gap:4px}
.gap-2{gap:8px}
.bold{font-weight:600}

@media (min-width:481px){
  .modal{border-radius:var(--radius);max-height:80dvh}
}
</style>
</head>
<body>

<header class="header" id="appHeader">
  <div class="search-bar" id="searchBar" style="display:none">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="searchInput" placeholder="搜索商品、SKU...">
  </div>
  <h1 id="headerTitle">靴履云仓</h1>
  <div class="header-actions">
    <button class="header-btn" id="btnSearch" aria-label="搜索">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>
</header>

<main class="main" id="mainContent">
  <div class="install-banner" id="installBanner">
    <p>安装到手机桌面，使用更方便</p>
    <button class="btn btn-sm" id="installBtn">安装</button>
  </div>
</main>

<nav class="nav">
  <button class="nav-item active" data-page="dashboard">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    <span>首页</span>
  </button>
  <button class="nav-item" data-page="products">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
    <span>库存</span>
  </button>
  <button class="nav-item" data-page="transactions">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    <span>记录</span>
  </button>
  <button class="nav-item" data-page="settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    <span>设置</span>
  </button>
</nav>

<button class="fab" id="fabBtn" aria-label="快捷操作">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<script>
// ============ IndexedDB Layer (v2 with variants) ============
const DB_NAME = 'ShoeWarehouseDB';
const DB_VERSION = 2;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const d = e.target.result;
      const oldVersion = e.oldVersion;

      if (oldVersion < 1) {
        const ps = d.createObjectStore('products', { keyPath: 'id', autoIncrement: true });
        ps.createIndex('sku', 'sku', { unique: true });
        ps.createIndex('category', 'category');
        ps.createIndex('name', 'name');
        const ts = d.createObjectStore('transactions', { keyPath: 'id', autoIncrement: true });
        ts.createIndex('productId', 'productId');
        ts.createIndex('type', 'type');
        ts.createIndex('createdAt', 'createdAt');
        const cs = d.createObjectStore('categories', { keyPath: 'id', autoIncrement: true });
        cs.createIndex('name', 'name', { unique: true });
        const ss = d.createObjectStore('suppliers', { keyPath: 'id', autoIncrement: true });
        ss.createIndex('name', 'name', { unique: true });
        const sts = d.createObjectStore('settings', { keyPath: 'key' });
      }

      if (oldVersion < 2) {
        if (!d.objectStoreNames.contains('product_variants')) {
          const vs = d.createObjectStore('product_variants', { keyPath: 'id', autoIncrement: true });
          vs.createIndex('productId', 'productId');
          vs.createIndex('size', 'size');
        }
        // Migrate old transactions: add variantId/size columns are implicit (no-op, just making sure store exists)
      }
    };
    req.onsuccess = (e) => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

// After DB open, migrate old product data if needed
async function migrateOldData() {
  try {
    const products = await dbGetAll('products');
    let migrated = 0;
    for (const p of products) {
      const existing = await dbGetByIndex('product_variants', 'productId', p.id);
      if (existing.length === 0 && (p.size || p.stock)) {
        // This is old data — create a variant from the product's size field
        await dbPut('product_variants', {
          productId: p.id,
          size: p.size || '通用',
          stock: p.stock || 0,
          createdAt: p.createdAt || Date.now()
        });
        migrated++;
      }
      // Clean up old fields
      if (p.size !== undefined || p.stock !== undefined) {
        delete p.size;
        delete p.stock;
        await dbPut('products', p);
      }
    }
    if (migrated > 0) console.log(`Migrated ${migrated} products to variant model`);
  } catch (e) {
    console.warn('Migration error (non-fatal):', e);
  }
}

function dbPut(storeName, data) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.put(data);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGet(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(id);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(storeName, id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).delete(id);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(storeName) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const req = tx.objectStore(storeName).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGetByIndex(storeName, indexName, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).index(indexName).getAll(value);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// ============ Helpers ============
async function getProductVariants(productId) {
  const variants = await dbGetByIndex('product_variants', 'productId', productId);
  return variants.sort((a, b) => {
    const na = parseFloat(a.size), nb = parseFloat(b.size);
    if (!isNaN(na) && !isNaN(nb)) return na - nb;
    return String(a.size).localeCompare(String(b.size));
  });
}

async function getProductStock(productId) {
  const variants = await dbGetByIndex('product_variants', 'productId', productId);
  return variants.reduce((s, v) => s + (v.stock || 0), 0);
}

async function getProductLowStockVariants(productId, threshold) {
  const variants = await dbGetByIndex('product_variants', 'productId', productId);
  return variants.filter(v => (v.stock || 0) <= threshold);
}

async function getProductsWithStock() {
  const products = await dbGetAll('products');
  const results = [];
  for (const p of products) {
    const stock = await getProductStock(p.id);
    const variantCount = (await dbGetByIndex('product_variants', 'productId', p.id)).length;
    results.push({ ...p, totalStock: stock, variantCount });
  }
  return results;
}

const $ = (sel, ctx) => (ctx || document).querySelector(sel);
const $$ = (sel, ctx) => (ctx || document).querySelectorAll(sel);

function fmtDate(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

let toastTimer;
function showToast(msg, type = '') {
  clearTimeout(toastTimer);
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 2200);
}

function confirm(msg, title = '确认操作') {
  return new Promise(resolve => {
    $('#confirmTitle').textContent = title;
    $('#confirmMsg').textContent = msg;
    const ov = $('#confirmOverlay');
    ov.classList.add('open');
    const cleanup = (val) => {
      ov.classList.remove('open');
      $('#confirmOK').removeEventListener('click', onOk);
      $('#confirmCancel').removeEventListener('click', onCancel);
      resolve(val);
    };
    const onOk = () => cleanup(true);
    const onCancel = () => cleanup(false);
    $('#confirmOK').addEventListener('click', onOk);
    $('#confirmCancel').addEventListener('click', onCancel);
  });
}

// ============ PWA Install ============
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  $('#installBanner').classList.add('show');
});

$('#installBtn').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  $('#installBanner').classList.remove('show');
  if (result.outcome === 'accepted') showToast('安装成功', 'success');
});

// Also install from menu (for browsers that don't show beforeinstallprompt)
// The header install button is visible when in browser mode
if (!window.matchMedia('(display-mode: standalone)').matches) {
  // We're in browser mode — show header install hint
}

// ============ Modal ============
function openModal(title, bodyHTML, footerHTML = '') {
  $('#modalTitle').textContent = title;
  $('#modalBody').innerHTML = bodyHTML;
  $('#modalFooter').innerHTML = footerHTML;
  $('#modalOverlay').classList.add('open');
  // Push a history state so Android back button can close the modal
  history.pushState({ modal: true }, '');
}

function closeModal(evt) {
  if (evt && evt.target !== evt.currentTarget) return;
  $('#modalOverlay').classList.remove('open');
}

$('#modalClose').addEventListener('click', closeModal);
$('#modalOverlay').addEventListener('click', (e) => {
  if (e.target === $('#modalOverlay')) {
    closeModal();
  }
});

// Android/gesture back: close modal instead of leaving page
window.addEventListener('popstate', (e) => {
  if ($('#modalOverlay').classList.contains('open')) {
    closeModal();
  }
});

// ============ Navigation & FAB ============
let currentPage = 'dashboard';
let currentFilters = {};

function navigateTo(page, params = {}) {
  currentPage = page;
  currentFilters = params;
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));

  if (page === 'dashboard') { renderDashboard(); $('#headerTitle').textContent = '靴履云仓'; $('#searchBar').style.display = 'none'; }
  else if (page === 'products') { renderProducts(); $('#headerTitle').textContent = '库存管理'; $('#searchBar').style.display = 'flex'; }
  else if (page === 'transactions') { renderTransactions(); $('#headerTitle').textContent = '出入库记录'; $('#searchBar').style.display = 'none'; }
  else if (page === 'settings') { renderSettings(); $('#headerTitle').textContent = '设置'; $('#searchBar').style.display = 'none'; }

  $('#mainContent').scrollTop = 0;
  closeFabMenu();
}

$$('.nav-item').forEach(n => n.addEventListener('click', () => navigateTo(n.dataset.page)));

let fabOpen = false;
function toggleFab() {
  fabOpen = !fabOpen;
  $('#fabMenu').classList.toggle('open', fabOpen);
  $('#fabOverlay').classList.toggle('open', fabOpen);
  if (fabOpen) {
    $('#fabBtn').innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  } else {
    $('#fabBtn').innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
  }
}
function closeFabMenu() { if (fabOpen) toggleFab(); }

$('#fabBtn').addEventListener('click', toggleFab);
$('#fabOverlay').addEventListener('click', closeFabMenu);
$$('.fab-menu-item').forEach(item => {
  item.addEventListener('click', () => {
    const action = item.dataset.action;
    closeFabMenu();
    if (action === 'inbound') showTransactionForm('in');
    else if (action === 'outbound') showTransactionForm('out');
    else if (action === 'addProduct') showProductForm();
  });
});

// Search
let searchTimer;
$('#searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    if (currentPage === 'products') renderProducts();
  }, 300);
});

$('#btnSearch').addEventListener('click', () => {
  if (currentPage === 'products') {
    currentFilters = { search: '' };
    $('#searchInput').value = '';
    $('#searchInput').focus();
  } else {
    $('#searchInput').value = '';
    navigateTo('products');
  }
});

// ============ Dashboard ============
async function renderDashboard() {
  const main = $('#mainContent');
  const productsWithStock = await getProductsWithStock();
  const transactions = await dbGetAll('transactions');
  const st = await dbGetAll('settings');
  const lowStockThreshold = parseInt(st.find(s => s.key === 'lowStockThreshold')?.value || '10');

  const totalProducts = productsWithStock.length;
  const totalStock = productsWithStock.reduce((s, p) => s + p.totalStock, 0);

  const now = new Date();
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  const todayTx = transactions.filter(t => t.createdAt >= todayStart);
  const todayIn = todayTx.filter(t => t.type === 'in').reduce((s, t) => s + t.quantity, 0);
  const todayOut = todayTx.filter(t => t.type === 'out').reduce((s, t) => s + t.quantity, 0);

  // Find products with any low-stock variant
  const lowStockProducts = [];
  for (const p of productsWithStock) {
    const lowVars = await getProductLowStockVariants(p.id, lowStockThreshold);
    if (lowVars.length > 0) lowStockProducts.push({ product: p, lowVariants: lowVars });
  }

  const recentTx = [...transactions].sort((a, b) => b.createdAt - a.createdAt).slice(0, 5);

  main.innerHTML = `
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon icon-store"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></div>
        <div class="stat-value">${totalStock.toLocaleString()}</div>
        <div class="stat-label">库存总量（双）</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon icon-in"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
        <div class="stat-value">${totalProducts}</div>
        <div class="stat-label">商品种类</div>
      </div>
    </div>
    <div class="stat-row three">
      <div class="stat-card">
        <div class="stat-value" style="color:var(--success);font-size:20px">${todayIn}</div>
        <div class="stat-label">今日入库</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--danger);font-size:20px">${todayOut}</div>
        <div class="stat-label">今日出库</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" style="color:var(--warning);font-size:20px">${lowStockProducts.length}</div>
        <div class="stat-label">库存不足</div>
      </div>
    </div>

    ${lowStockProducts.length > 0 ? `
    <div class="card">
      <div class="card-header">
        <span class="card-title">⚠ 低库存提醒（阈值 ${lowStockThreshold}）</span>
        <a href="javascript:void(0)" style="font-size:13px;color:var(--accent)" onclick="navigateTo('products',{filter:'low'})">查看全部 →</a>
      </div>
      ${lowStockProducts.slice(0, 8).map(({ product, lowVariants }) => {
        const sizes = lowVariants.map(v => v.size).join(' / ');
        const minStock = Math.min(...lowVariants.map(v => v.stock || 0));
        return `<div class="alert-item" onclick="showProductDetail(${product.id})">
          <div class="alert-dot pulse"></div>
          <div class="alert-info">
            <div class="alert-name">${escHtml(product.name)}</div>
            <div class="alert-meta">尺码 ${sizes} 不足 · ${product.location || '未设库位'}</div>
          </div>
          <div class="alert-stock">最低 ${minStock}</div>
        </div>`;
      }).join('')}
    </div>
    ` : ''}

    <div class="card">
      <div class="card-header">
        <span class="card-title">最近操作</span>
        <a href="javascript:void(0)" style="font-size:13px;color:var(--accent)" onclick="navigateTo('transactions')">全部 →</a>
      </div>
      ${recentTx.length === 0 ? '<div class="empty" style="padding:24px"><p>暂无操作记录</p></div>' :
      recentTx.map(t => {
        const p = productsWithStock.find(x => x.id === t.productId);
        const isIn = t.type === 'in';
        return `<div class="list-item" onclick="showTransactionDetail(${t.id})">
          <div class="list-thumb" style="font-size:18px">${isIn ? '📥' : '📤'}</div>
          <div class="list-info">
            <div class="list-name">${escHtml(p?.name || '已删除商品')}${t.size ? ' ' + t.size + '码' : ''}</div>
            <div class="list-meta">${fmtDate(t.createdAt)} · ${t.supplier || t.destination || ''}</div>
          </div>
          <div class="list-right">
            <div class="count ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${t.quantity}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

// ============ Products List ============
async function renderProducts() {
  const main = $('#mainContent');
  const search = $('#searchInput').value.trim().toLowerCase() || currentFilters.search || '';
  const filter = currentFilters.filter || '';
  const st = await dbGetAll('settings');
  const lowStockThreshold = parseInt(st.find(s => s.key === 'lowStockThreshold')?.value || '10');

  let productsWithStock = await getProductsWithStock();

  if (search) {
    const q = search.toLowerCase();
    productsWithStock = productsWithStock.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.sku || '').toLowerCase().includes(q) ||
      (p.brand || '').toLowerCase().includes(q)
    );
  }
  if (filter === 'low') {
    const lowIds = new Set();
    for (const p of productsWithStock) {
      const lowVars = await getProductLowStockVariants(p.id, lowStockThreshold);
      if (lowVars.length > 0) lowIds.add(p.id);
    }
    productsWithStock = productsWithStock.filter(p => lowIds.has(p.id));
  }

  productsWithStock.sort((a, b) => a.name.localeCompare(b.name, 'zh'));

  if (productsWithStock.length === 0) {
    main.innerHTML = `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <h3>${search || filter ? '未找到匹配商品' : '还没有商品'}</h3>
        <p>${search || filter ? '试试其他关键词' : '点击下方 + 按钮添加第一个商品'}</p>
        ${!search && !filter ? '<button class="btn btn-primary" onclick="showProductForm()">添加商品</button>' : ''}
      </div>
    `;
    return;
  }

  main.innerHTML = productsWithStock.map(p => {
    const sizes = p.variantCount > 0 ? `${p.variantCount}个尺码` : '';
    const low = p.totalStock <= lowStockThreshold && p.totalStock > 0;
    const zero = p.totalStock === 0;
    return `<div class="list-item" onclick="showProductDetail(${p.id})">
      <div class="list-thumb">
        ${p.photo ? `<img src="${p.photo}" alt="">` : '<span>👟</span>'}
      </div>
      <div class="list-info">
        <div class="list-name">${escHtml(p.name)}${low ? ' <span class="tag tag-warn" style="margin-left:6px">低库存</span>' : ''}${zero ? ' <span class="tag tag-out" style="margin-left:6px">缺货</span>' : ''}</div>
        <div class="list-meta">${p.sku || '无SKU'} · ${p.category || '未分类'} · ${sizes || ''} ${p.color || ''}</div>
      </div>
      <div class="list-right">
        <div class="count" style="color:${zero ? 'var(--danger)' : low ? 'var(--warning)' : 'inherit'}">${p.totalStock}</div>
        <div class="sub">${p.location || ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ============ Product Detail ============
async function showProductDetail(id) {
  const p = await dbGet('products', id);
  if (!p) return;
  const variants = await getProductVariants(id);
  const totalStock = variants.reduce((s, v) => s + (v.stock || 0), 0);
  const st = await dbGetAll('settings');
  const lowThreshold = parseInt(st.find(s => s.key === 'lowStockThreshold')?.value || '10');
  const lowVarCount = variants.filter(v => (v.stock || 0) <= lowThreshold).length;

  const main = $('#mainContent');
  main.innerHTML = `
    <div class="detail-header">
      <button class="back-btn" onclick="navigateTo('products')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="detail-photo">${p.photo ? `<img src="${p.photo}" alt="" style="width:100%;height:100%;object-fit:cover">` : ''}</div>
      <div class="detail-name">${escHtml(p.name)}</div>
      <div class="detail-sku">${p.sku || '无SKU'}</div>
      <div class="detail-stock">${totalStock} <span style="font-size:14px;font-weight:400;opacity:.6">双 · ${variants.length}个尺码</span></div>
      <div class="detail-meta-row">
        ${totalStock === 0 ? '<span class="tag tag-out">缺货</span>' : lowVarCount > 0 ? `<span class="tag tag-warn">${lowVarCount}个尺码库存不足</span>` : '<span class="tag tag-in">库存正常</span>'}
        ${p.category ? `<span class="tag" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.9)">${escHtml(p.category)}</span>` : ''}
      </div>
    </div>
    <div class="detail-body">
      <div class="detail-section">
        <h4>尺码库存明细</h4>
        <div style="overflow-x:auto;margin:-4px -4px 0">
          <table class="variant-table">
            <thead><tr><th>尺码</th><th>库存（双）</th><th>状态</th></tr></thead>
            <tbody>
              ${variants.map(v => {
                const stock = v.stock || 0;
                const isLow = stock <= lowThreshold;
                const isZero = stock === 0;
                return `<tr>
                  <td style="font-weight:600;font-family:var(--font-mono)">${escHtml(String(v.size))}</td>
                  <td class="v-stock ${isZero ? 'v-zero' : isLow ? 'v-low' : ''}">${stock}</td>
                  <td>${isZero ? '<span class="tag tag-out">缺货</span>' : isLow ? '<span class="tag tag-warn">偏低</span>' : '<span class="tag tag-in">正常</span>'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div class="detail-section">
        <h4>基本信息</h4>
        <div class="detail-field"><span class="key">品牌</span><span class="val">${escHtml(p.brand || '-')}</span></div>
        <div class="detail-field"><span class="key">颜色</span><span class="val">${escHtml(p.color || '-')}</span></div>
        <div class="detail-field"><span class="key">分类</span><span class="val">${escHtml(p.category || '-')}</span></div>
        <div class="detail-field"><span class="key">供应商</span><span class="val">${escHtml(p.supplier || '-')}</span></div>
      </div>
      <div class="detail-section">
        <h4>库存信息</h4>
        <div class="detail-field"><span class="key">总库存</span><span class="val" style="font-weight:700">${totalStock} 双</span></div>
        <div class="detail-field"><span class="key">最低库存阈值</span><span class="val">${p.minStock ?? lowThreshold} 双/尺码</span></div>
        <div class="detail-field"><span class="key">库位</span><span class="val">${escHtml(p.location || '-')}</span></div>
        <div class="detail-field"><span class="key">成本价</span><span class="val">${p.cost ? '¥' + Number(p.cost).toFixed(2) : '-'}</span></div>
        <div class="detail-field"><span class="key">零售价</span><span class="val">${p.price ? '¥' + Number(p.price).toFixed(2) : '-'}</span></div>
      </div>
      ${p.note ? `<div class="detail-section"><h4>备注</h4><p style="font-size:14px;line-height:1.6;white-space:pre-wrap">${escHtml(p.note)}</p></div>` : ''}
      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-primary" style="flex:1" onclick="showProductForm(${p.id})">编辑</button>
        <button class="btn btn-secondary" style="flex:1" onclick="showTransactionForm('in', ${p.id})">入库</button>
        <button class="btn btn-secondary" style="flex:1" onclick="showTransactionForm('out', ${p.id})">出库</button>
      </div>
    </div>
  `;
}

// ============ Product Form ============
async function showProductForm(editId = null) {
  let product = null;
  let existingVariants = [];
  if (editId) {
    product = await dbGet('products', editId);
    existingVariants = await getProductVariants(editId);
  }
  const categories = await dbGetAll('categories');
  const suppliers = await dbGetAll('suppliers');

  const variantsJSON = JSON.stringify(existingVariants.map(v => ({ size: v.size, stock: v.stock || 0 })));

  openModal(editId ? '编辑商品' : '新增商品', `
    <div class="form-group">
      <label class="form-label"><span class="req">*</span> 商品名称</label>
      <input class="form-input" id="pfName" value="${escHtml(product?.name || '')}" placeholder="例如：Airmax 270 男款运动鞋">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label"><span class="req">*</span> SKU编码</label>
        <input class="form-input" id="pfSku" value="${escHtml(product?.sku || '')}" placeholder="例如：AM270-M-BK">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">品牌</label>
        <input class="form-input" id="pfBrand" value="${escHtml(product?.brand || '')}" placeholder="例如：Nike">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">颜色</label>
      <input class="form-input" id="pfColor" value="${escHtml(product?.color || '')}" placeholder="例如：黑色">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">分类</label>
        <select class="form-input" id="pfCategory">
          <option value="">未分类</option>
          ${categories.map(c => `<option value="${escHtml(c.name)}" ${product?.category === c.name ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('')}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">供应商</label>
        <select class="form-input" id="pfSupplier">
          <option value="">无</option>
          ${suppliers.map(s => `<option value="${escHtml(s.name)}" ${product?.supplier === s.name ? 'selected' : ''}>${escHtml(s.name)}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><span class="req">*</span> 尺码与库存</label>
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">输入尺码范围自动生成，也可逐个添加</div>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input class="form-input" id="pfSizeFrom" placeholder="起始尺码（如 37）" style="flex:1" inputmode="decimal">
        <span style="display:flex;align-items:center;color:var(--text-secondary)">—</span>
        <input class="form-input" id="pfSizeTo" placeholder="结束尺码（如 43）" style="flex:1" inputmode="decimal">
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <input class="form-input" id="pfSingleSize" placeholder="或添加单个尺码" inputmode="decimal" style="flex:1">
        <button class="btn btn-sm btn-secondary" id="pfAddSize" style="flex-shrink:0">添加</button>
      </div>
      <div class="card" style="background:var(--bg);padding:10px">
        <div id="pfVariantList"></div>
      </div>
      <input type="hidden" id="pfVariantsData" value='${variantsJSON}'>
    </div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">成本价 (¥)</label>
        <input class="form-input" id="pfCost" type="number" step="0.01" min="0" value="${product?.cost || ''}">
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">零售价 (¥)</label>
        <input class="form-input" id="pfPrice" type="number" step="0.01" min="0" value="${product?.price || ''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">最低库存阈值</label>
      <input class="form-input" id="pfMinStock" type="number" min="0" value="${product?.minStock || ''}" placeholder="每个尺码低于此数提醒（全局默认10）">
    </div>
    <div class="form-group">
      <label class="form-label">库位</label>
      <input class="form-input" id="pfLocation" value="${escHtml(product?.location || '')}" placeholder="例如：A区-3排-12号">
    </div>
    <div class="form-group">
      <label class="form-label">商品图片</label>
      <div class="photo-pick ${product?.photo ? 'has-photo' : ''}" id="pfPhoto" onclick="document.getElementById('pfPhotoInput').click()">
        ${product?.photo ? `<img src="${product.photo}" alt="">` : '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:13px">点击拍照或选择图片</span>'}
        ${product?.photo ? `<span class="photo-remove" onclick="event.stopPropagation();clearPhoto('pfPhoto','pfPhotoData')">✕</span>` : ''}
      </div>
      <input type="file" id="pfPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoPick(this, 'pfPhoto', 'pfPhotoData')">
      <textarea id="pfPhotoData" style="display:none">${product?.photo || ''}</textarea>
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="form-input form-textarea" id="pfNote" placeholder="补充说明…">${escHtml(product?.note || '')}</textarea>
    </div>
  `, `
    ${editId ? '<button class="btn btn-danger" id="pfDeleteBtn">删除商品</button>' : ''}
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" id="pfSaveBtn">保存</button>
  `);

  // Variant management
  function getVariants() {
    try { return JSON.parse($('#pfVariantsData').value || '[]'); } catch(e) { return []; }
  }
  function setVariants(data) { $('#pfVariantsData').value = JSON.stringify(data); }
  function renderVariants() {
    const vars = getVariants();
    const list = $('#pfVariantList');
    if (vars.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:var(--text-secondary);font-size:13px;padding:12px">暂无尺码，请添加</div>';
      return;
    }
    list.innerHTML = vars.map((v, i) => `
      <div class="variant-input-row">
        <span class="vi-size">${escHtml(String(v.size))}码</span>
        <div class="qty-stepper">
          <button onclick="event.preventDefault();variantChange(${i},-1)">−</button>
          <input type="number" value="${v.stock}" min="0" onchange="variantSetStock(${i},this.value)" style="font-size:14px">
          <button onclick="event.preventDefault();variantChange(${i},1)">+</button>
        </div>
        <span style="font-size:11px;color:var(--text-secondary);margin-left:4px">双</span>
        <button class="btn btn-sm btn-secondary" style="margin-left:auto;color:var(--danger);font-size:11px" onclick="event.preventDefault();deleteVariant(${i})">删除</button>
      </div>
    `).join('');
  }

  window.variantChange = function(i, delta) {
    const vars = getVariants();
    vars[i].stock = Math.max(0, (vars[i].stock || 0) + delta);
    setVariants(vars);
    renderVariants();
  };
  window.variantSetStock = function(i, val) {
    const vars = getVariants();
    vars[i].stock = Math.max(0, parseInt(val) || 0);
    setVariants(vars);
    renderVariants();
  };
  window.deleteVariant = function(i) {
    const vars = getVariants();
    vars.splice(i, 1);
    setVariants(vars);
    renderVariants();
  };

  $('#pfAddSize').addEventListener('click', () => {
    const fromVal = $('#pfSizeFrom').value.trim();
    const toVal = $('#pfSizeTo').value.trim();
    const singleVal = $('#pfSingleSize').value.trim();

    const vars = getVariants();
    const existingSizes = new Set(vars.map(v => String(v.size)));

    if (singleVal) {
      if (!existingSizes.has(singleVal)) {
        vars.push({ size: singleVal, stock: 1 });
      }
      $('#pfSingleSize').value = '';
    } else if (fromVal && toVal) {
      const from = parseFloat(fromVal);
      const to = parseFloat(toVal);
      if (!isNaN(from) && !isNaN(to) && from <= to) {
        for (let s = from; s <= to; s++) {
          const sz = /\./.test(String(s)) ? String(s) : String(Math.round(s));
          if (!existingSizes.has(sz)) {
            vars.push({ size: sz, stock: 1 });
          }
        }
      }
      $('#pfSizeFrom').value = '';
      $('#pfSizeTo').value = '';
    } else if (fromVal) {
      if (!existingSizes.has(fromVal)) {
        vars.push({ size: fromVal, stock: 1 });
      }
      $('#pfSizeFrom').value = '';
    }

    vars.sort((a, b) => (parseFloat(a.size) || 0) - (parseFloat(b.size) || 0));
    setVariants(vars);
    renderVariants();
  });

  if (editId) {
    $('#pfDeleteBtn').addEventListener('click', async () => {
      const ok = await confirm('删除后无法恢复，该商品相关的出入库记录仍会保留。', '删除商品');
      if (!ok) return;
      await dbDelete('products', editId);
      const vs = await dbGetByIndex('product_variants', 'productId', editId);
      for (const v of vs) await dbDelete('product_variants', v.id);
      closeModal();
      showToast('已删除', 'success');
      renderProducts();
    });
  }

  $('#pfSaveBtn').addEventListener('click', async () => {
    const name = $('#pfName').value.trim();
    const sku = $('#pfSku').value.trim();
    const variants = getVariants();
    if (!name) { showToast('请输入商品名称'); return; }
    if (!sku) { showToast('请输入SKU编码'); return; }
    if (variants.length === 0) { showToast('请添加至少一个尺码'); return; }

    const productData = {
      name, sku,
      brand: $('#pfBrand').value.trim(),
      color: $('#pfColor').value.trim(),
      category: $('#pfCategory').value,
      supplier: $('#pfSupplier').value,
      minStock: parseInt($('#pfMinStock').value) || null,
      cost: parseFloat($('#pfCost').value) || null,
      price: parseFloat($('#pfPrice').value) || null,
      location: $('#pfLocation').value.trim(),
      photo: $('#pfPhotoData').value || null,
      note: $('#pfNote').value.trim(),
      updatedAt: Date.now()
    };
    if (!editId) productData.createdAt = Date.now();

    try {
      // IMPORTANT: fetch all data BEFORE opening any IDB transaction (auto-commits on await)
      let oldVars = [];
      let skuExists = false;
      if (editId) {
        oldVars = await dbGetByIndex('product_variants', 'productId', editId);
      } else {
        const existing = await dbGetByIndex('products', 'sku', sku);
        skuExists = existing.length > 0;
      }

      if (!editId && skuExists) { showToast('SKU编码已存在'); return; }

      let productId = editId;

      // Step 1: save product
      const tx1 = db.transaction(['products'], 'readwrite');
      const pStore = tx1.objectStore('products');
      if (editId) {
        productData.id = editId;
        pStore.put(productData);
      } else {
        const addReq = pStore.add(productData);
        addReq.onsuccess = () => { productId = addReq.result; };
      }

      tx1.oncomplete = () => {
        // Step 2: now save variants (after product ID is known)
        const tx2 = db.transaction(['product_variants'], 'readwrite');
        const vStore = tx2.objectStore('product_variants');

        if (editId) {
          // Delete old variants first
          for (const ov of oldVars) vStore.delete(ov.id);
        }

        for (const v of variants) {
          vStore.add({ productId: productId || editId, size: v.size, stock: v.stock || 1, createdAt: Date.now() });
        }

        tx2.oncomplete = () => {
          closeModal();
          showToast(editId ? '已更新' : '已添加', 'success');
          refreshCurrentPage();
        };
        tx2.onerror = () => showToast('保存尺码失败');
      };
      tx1.onerror = () => showToast('保存失败');
    } catch (err) {
      showToast('保存失败：' + err.message);
    }
  });

  renderVariants();
}

  const title = isIn ? '入库' : '出库';
  const btnLabel = isIn ? '确认入库' : '确认出库';

  openModal(title, `
    <div class="form-group">
      <label class="form-label"><span class="req">*</span> 选择商品</label>
      <div style="position:relative">
        <input class="form-input" id="tfSearchProduct" placeholder="搜索商品名称或SKU..." style="margin-bottom:8px" autocomplete="off">
        <div id="tfProductList" style="max-height:200px;overflow-y:auto;background:var(--bg);border-radius:var(--radius-sm);display:none"></div>
      </div>
      <select class="form-input" id="tfProduct" style="display:none">
        <option value="">请选择商品</option>
        ${products.map(p => `<option value="${p.id}" ${p.id === presetProductId ? 'selected' : ''}>${escHtml(p.name)} (${p.sku || '无SKU'})</option>`).join('')}

      <input type="hidden" id="tfSelectedProductId" value="${presetProductId || ''}">
      ${presetProductId ? `<div style="font-size:13px;color:var(--accent);margin-top:4px" id="tfSelectedLabel">已选：${escHtml(products.find(p=>p.id===presetProductId)?.name || '')}</div>` : `<div style="font-size:13px;color:var(--text-secondary);margin-top:4px" id="tfSelectedLabel">未选择</div>`}
    </div>
    <div class="form-group variant-picker" id="tfVariantPicker" style="display:none">
      <label class="form-label"><span class="req">*</span> 选择尺码</label>
      <div class="size-chips" id="tfVariantChips"></div>
    </div>
    <div class="form-group" id="tfQtyGroup" style="display:none">
      <label class="form-label"><span class="req">*</span> 数量</label>
      <input class="form-input" id="tfQty" type="number" min="1" placeholder="请输入数量（双）">
    </div>
    <div class="form-group">
      <label class="form-label">${isIn ? '供应商/来源' : '去向/客户'}</label>
      ${isIn ? `
        <select class="form-input" id="tfSupplier">
          <option value="">请选择（可选）</option>
          ${suppliers.map(s => `<option value="${escHtml(s.name)}">${escHtml(s.name)}</option>`).join('')}
          <option value="__custom__">其他（手动输入）</option>
        </select>
        <input class="form-input" id="tfSupplierCustom" style="display:none;margin-top:8px" placeholder="请输入供应商名称">
      ` : `
        <input class="form-input" id="tfDestination" placeholder="例如：零售客户、批发等">
      `}
    </div>
    <div class="form-group">
      <label class="form-label">留档照片</label>
      <div class="photo-pick" id="tfPhoto" onclick="document.getElementById('tfPhotoInput').click()">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <span style="font-size:13px">点击拍照留档</span>
      </div>
      <input type="file" id="tfPhotoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoPick(this, 'tfPhoto', 'tfPhotoData')">
      <textarea id="tfPhotoData" style="display:none"></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="form-input form-textarea" id="tfNote" placeholder="补充说明…"></textarea>
    </div>
    <div class="card" style="background:${isIn ? 'var(--success-light)' : 'var(--danger-light)'};margin-bottom:0;font-size:13px">
      ${isIn ? '所选尺码的库存将相应增加' : '请确认所选尺码库存充足'}
    </div>
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    <button class="btn btn-primary" id="tfSaveBtn" style="background:${isIn ? 'var(--success)' : 'var(--danger)'}">${btnLabel}</button>
  `);

  let selectedVariantId = null;
  let selectedVariantSize = null;
  let selectedVariantStock = 0;

  // Product search functionality
  function filterProducts(query) {
    const q = query.toLowerCase();
    const list = $('#tfProductList');
    const filtered = products.filter(p =>
      (p.name || '').toLowerCase().includes(q) ||
      (p.sku || '').toLowerCase().includes(q) ||
      (p.brand || '').toLowerCase().includes(q)
    );
    if (filtered.length === 0) {
      list.style.display = 'block';
      list.innerHTML = '<div style="padding:12px;text-align:center;color:var(--text-secondary);font-size:13px">未找到匹配商品</div>';
      return;
    }
    list.style.display = 'block';
    list.innerHTML = filtered.slice(0, 30).map(p => `
      <div class="list-item" style="margin:0;padding:10px 12px;cursor:pointer" onclick="void(0)">
        <div class="list-info">
          <div class="list-name">${escHtml(p.name)}</div>
          <div class="list-meta">${escHtml(p.sku)} · ${p.brand || ''}</div>
        </div>
      </div>
    `).join('');

    // Bind click handlers
    list.querySelectorAll('.list-item').forEach((item, i) => {
      item.addEventListener('click', () => {
        const p = filtered[i];
        $('#tfSelectedProductId').value = p.id;
        $('#tfSearchProduct').value = p.name;
        $('#tfSelectedLabel').innerHTML = '已选：' + escHtml(p.name);
        list.style.display = 'none';
        loadVariants(p.id);
      });
    });
  }

  $('#tfSearchProduct').addEventListener('input', function() {
    const v = this.value.trim();
    if (v.length > 0) {
      filterProducts(v);
    } else {
      $('#tfProductList').style.display = 'none';
      // If user cleared search without selecting, clear selection
      $('#tfSelectedProductId').value = '';
      $('#tfSelectedLabel').innerHTML = '未选择';
      $('#tfVariantPicker').style.display = 'none';
      $('#tfQtyGroup').style.display = 'none';
    }
  });

  $('#tfSearchProduct').addEventListener('focus', function() {
    if (this.value.trim().length > 0) filterProducts(this.value.trim());
  });

  // Close search dropdown when clicking outside
  document.addEventListener('click', function(e) {
    if (!e.target.closest('#tfSearchProduct') && !e.target.closest('#tfProductList')) {
      $('#tfProductList').style.display = 'none';
      const searchInput = $('#tfSearchProduct');
      if (searchInput && !$('#tfSelectedProductId').value) searchInput.value = '';
    }
  });

  async function loadVariants(productId) {
    const variants = await getProductVariants(productId);
    const chips = $('#tfVariantChips');
    selectedVariantId = null;
    selectedVariantSize = null;
    selectedVariantStock = 0;

    if (variants.length === 0) {
      $('#tfVariantPicker').style.display = 'none';
      $('#tfQtyGroup').style.display = 'none';
      chips.innerHTML = '<div style="font-size:13px;color:var(--text-secondary);padding:8px 0">该商品暂无尺码</div>';
      return;
    }

    $('#tfVariantPicker').style.display = 'block';
    chips.innerHTML = variants.map(v => `
      <div class="size-chip" data-vid="${v.id}" data-size="${escHtml(String(v.size))}" data-stock="${v.stock || 0}">
        <span class="chip-size">${escHtml(String(v.size))}</span>
        <span class="chip-qty">${v.stock || 0}双</span>
      </div>
    `).join('');

    chips.querySelectorAll('.size-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        chips.querySelectorAll('.size-chip').forEach(c => c.classList.remove('selected'));
        chip.classList.add('selected');
        selectedVariantId = parseInt(chip.dataset.vid);
        selectedVariantSize = chip.dataset.size;
        selectedVariantStock = parseInt(chip.dataset.stock) || 0;
        $('#tfQtyGroup').style.display = 'block';
        $('#tfQty').focus();

        if (!isIn && selectedVariantStock === 0) {
          showToast('该尺码已缺货');
        }
      });
    });
  }

  // Preload variants if a product is preset
  if (presetProductId) {
    $('#tfSelectedProductId').value = presetProductId;
    const presetProduct = products.find(p => p.id === presetProductId);
    if (presetProduct) {
      $('#tfSearchProduct').value = presetProduct.name;
      $('#tfSelectedLabel').innerHTML = '已选：' + escHtml(presetProduct.name);
    }
    loadVariants(presetProductId);
  }

  if (isIn) {
    const supSelect = $('#tfSupplier');
    const supCustom = $('#tfSupplierCustom');
    supSelect.addEventListener('change', () => {
      supCustom.style.display = supSelect.value === '__custom__' ? 'block' : 'none';
      if (supSelect.value === '__custom__') supCustom.focus();
    });
  }

  $('#tfSaveBtn').addEventListener('click', async () => {
    const productId = parseInt($('#tfSelectedProductId').value);
    const qty = parseInt($('#tfQty').value);
    if (!productId) { showToast('请选择商品'); return; }
    if (!selectedVariantId) { showToast('请选择尺码'); return; }
    if (!qty || qty <= 0) { showToast('请输入有效数量'); return; }

    if (!isIn && selectedVariantStock < qty) {
      showToast(`库存不足：该尺码仅剩 ${selectedVariantStock} 双`);
      return;
    }

    const product = await dbGet('products', productId);
    const variant = await dbGet('product_variants', selectedVariantId);
    if (!product || !variant) { showToast('数据异常，请刷新'); return; }

    const supplier = isIn ? ($('#tfSupplier').value === '__custom__' ? $('#tfSupplierCustom').value.trim() : $('#tfSupplier').value) : '';
    const destination = !isIn ? $('#tfDestination').value.trim() : '';

    const tx = {
      productId,
      variantId: selectedVariantId,
      sku: product.sku,
      size: selectedVariantSize,
      type: isIn ? 'in' : 'out',
      quantity: qty,
      supplier: supplier || null,
      destination: isIn ? null : (destination || null),
      photo: $('#tfPhotoData').value || null,
      note: $('#tfNote').value.trim() || null,
      createdAt: Date.now()
    };

    variant.stock = (variant.stock || 0) + (isIn ? qty : -qty);

    const txDB = db.transaction(['transactions', 'product_variants'], 'readwrite');
    txDB.objectStore('transactions').add(tx);
    txDB.objectStore('product_variants').put(variant);

    txDB.oncomplete = () => {
      closeModal();
      showToast(`${isIn ? '入库' : '出库'}成功`, 'success');
      refreshCurrentPage();
    };
    txDB.onerror = () => showToast('操作失败');
  });
}

async function renderTransactions() {
  const main = $('#mainContent');
  let transactions = await dbGetAll('transactions');
  const products = await dbGetAll('products');
  transactions.sort((a, b) => b.createdAt - a.createdAt);

  main.innerHTML = `
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn btn-sm btn-secondary filter-btn active" data-filter="all">全部</button>
      <button class="btn btn-sm btn-secondary filter-btn" data-filter="in">入库</button>
      <button class="btn btn-sm btn-secondary filter-btn" data-filter="out">出库</button>
    </div>
    <div id="txList"></div>
  `;

  let activeFilter = 'all';

  function renderList() {
    let filtered = transactions;
    if (activeFilter === 'in') filtered = transactions.filter(t => t.type === 'in');
    else if (activeFilter === 'out') filtered = transactions.filter(t => t.type === 'out');

    const list = $('#txList');
    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📋</div><p>暂无记录</p></div>';
      return;
    }
    list.innerHTML = filtered.map(t => {
      const p = products.find(x => x.id === t.productId);
      const isIn = t.type === 'in';
      return `<div class="list-item" onclick="showTransactionDetail(${t.id})">
        <div class="list-thumb" style="font-size:18px">${isIn ? '📥' : '📤'}</div>
        <div class="list-info">
          <div class="list-name">${escHtml(p?.name || '已删除商品')}${t.size ? ' ' + t.size + '码' : ''}</div>
          <div class="list-meta">${fmtDate(t.createdAt)} · ${t.supplier || t.destination || ''}</div>
        </div>
        <div class="list-right">
          <div class="count ${isIn ? 'in' : 'out'}">${isIn ? '+' : '-'}${t.quantity}</div>
        </div>
      </div>`;
    }).join('');
  }

  renderList();

  $$('.filter-btn', main).forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.filter-btn', main).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderList();
    });
  });
}

function refreshCurrentPage() {
  if (currentPage === 'dashboard') renderDashboard();
  else if (currentPage === 'transactions') renderTransactions();
  else if (currentPage === 'products') renderProducts();
  else if (currentPage === 'settings') renderSettings();
}

// ============ Excel Export ============
async function exportExcel() {
  const products = await dbGetAll('products');
  const transactions = await dbGetAll('transactions');
  const wb = XLSX.utils.book_new();
  const pRows = [];
  for (const p of products) {
    const variants = await getProductVariants(p.id);
    if (variants.length === 0) {
      pRows.push({ 'SKU': p.sku || '', '商品名称': p.name || '', '品牌': p.brand || '', '尺码': '', '库存': 0, '颜色': p.color || '', '分类': p.category || '', '供应商': p.supplier || '', '最低库存': p.minStock || '', '成本价': p.cost || '', '零售价': p.price || '', '库位': p.location || '', '备注': p.note || '' });
    } else {
      for (const v of variants) {
        pRows.push({ 'SKU': p.sku || '', '商品名称': p.name || '', '品牌': p.brand || '', '尺码': v.size, '库存': v.stock || 0, '颜色': p.color || '', '分类': p.category || '', '供应商': p.supplier || '', '最低库存': p.minStock || '', '成本价': p.cost || '', '零售价': p.price || '', '库位': p.location || '', '备注': p.note || '' });
      }
    }
  }
  if (pRows.length > 0) { const pws = XLSX.utils.json_to_sheet(pRows); pws['!cols'] = Object.keys(pRows[0]).map((k, i) => ({ wch: Math.max(k.length * 2, 10) })); XLSX.utils.book_append_sheet(wb, pws, '商品列表(含尺码)'); }
  const tData = transactions.map(t => { const p = products.find(x => x.id === t.productId); return { '类型': t.type === 'in' ? '入库' : '出库', '商品名称': p?.name || '', 'SKU': t.sku || '', '尺码': t.size || '', '数量': t.quantity, '供应商/去向': t.supplier || t.destination || '', '备注': t.note || '', '时间': fmtDate(t.createdAt) }; });
  if (tData.length > 0) { const tws = XLSX.utils.json_to_sheet(tData); tws['!cols'] = Object.keys(tData[0]).map((k, i) => ({ wch: Math.max(k.length * 2, 12) })); XLSX.utils.book_append_sheet(wb, tws, '出入库记录'); }
  if (pRows.length === 0 && tData.length === 0) { showToast('暂无数据可导出'); return; }
  XLSX.writeFile(wb, '靴履云仓_数据导出_' + new Date().toISOString().slice(0,10) + '.xlsx');
  showToast('导出成功', 'success');
}
