$('#excelFileInput').addEventListener('change', async function() {
  const file = this.files[0];
  if (!file) return;
  this.value = '';
  try {
    const raw = await new Promise((resolve, reject) => { const reader = new FileReader(); reader.onload = () => resolve(new Uint8Array(reader.result)); reader.onerror = reject; reader.readAsArrayBuffer(file); });
    const wb = XLSX.read(raw, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws);
    if (rows.length === 0) { showToast('文件中没有数据'); return; }

    let imported = 0, skipped = 0;
    const skuGroups = {};
    for (const row of rows) {
      const name = (row['商品名称'] || row['名称'] || '').toString().trim();
      const sku = (row['SKU'] || row['sku'] || row['货号'] || '').toString().trim();
      const size = (row['尺码'] !== undefined && row['尺码'] !== '') ? String(row['尺码']).trim() : null;
      if (!name || !sku) { skipped++; continue; }
      if (!skuGroups[sku]) {
        skuGroups[sku] = { name, sku, brand: (row['品牌'] || '').toString().trim(), color: (row['颜色'] || '').toString().trim(), category: (row['分类'] || '').toString().trim(), supplier: (row['供应商'] || '').toString().trim(), minStock: parseInt(row['最低库存']) || null, cost: parseFloat(row['成本价']) || null, price: parseFloat(row['零售价']) || null, location: (row['库位'] || '').toString().trim(), note: (row['备注'] || '').toString().trim(), variants: [] };
      }
      if (size) skuGroups[sku].variants.push({ size, stock: parseInt(row['库存']) || 0 });
      if (!skuGroups[sku].brand) skuGroups[sku].brand = (row['品牌'] || '').toString().trim();
      if (!skuGroups[sku].color) skuGroups[sku].color = (row['颜色'] || '').toString().trim();
      if (!skuGroups[sku].category) skuGroups[sku].category = (row['分类'] || '').toString().trim();
      if (!skuGroups[sku].supplier) skuGroups[sku].supplier = (row['供应商'] || '').toString().trim();
    }

    // Pre-resolve existing products OUTSIDE any transaction
    const existingProducts = {};
    const existingVariantsMap = {};
    for (const sku of Object.keys(skuGroups)) {
      const ex = await dbGetByIndex('products', 'sku', sku);
      if (ex.length > 0) { existingProducts[sku] = ex[0].id; const ev = await dbGetByIndex('product_variants', 'productId', ex[0].id); existingVariantsMap[sku] = new Set(ev.map(v => String(v.size))); }
    }

    const entries = Object.entries(skuGroups);
    function processBatch(idx) {
      if (idx >= entries.length) {
        $('#importResult').innerHTML = '<div class="card" style="background:' + (imported > 0 ? 'var(--success-light)' : 'var(--warning-light)') + '"><div style="font-weight:500">导入完成</div><div style="font-size:13px;color:var(--text-secondary);margin-top:4px">成功导入 <b>' + imported + '</b> 个商品，跳过 <b>' + skipped + '</b> 行</div></div>';
        if (imported > 0) { showToast('成功导入 ' + imported + ' 个商品', 'success'); refreshCurrentPage(); }
        return;
      }
      const [sku, group] = entries[idx];
      if (group.variants.length === 0) { skipped++; processBatch(idx + 1); return; }

      const tx = db.transaction(['products', 'product_variants'], 'readwrite');
      const pStore = tx.objectStore('products');
      const vStore = tx.objectStore('product_variants');

      if (existingProducts[sku]) {
        const pid = existingProducts[sku];
        const existSizes = existingVariantsMap[sku] || new Set();
        for (const v of group.variants) { if (!existSizes.has(String(v.size))) { vStore.add({ productId: pid, size: v.size, stock: v.stock, createdAt: Date.now() }); } }
      } else {
        const pd = { name: group.name, sku: group.sku, brand: group.brand, color: group.color, category: group.category, supplier: group.supplier, minStock: group.minStock, cost: group.cost, price: group.price, location: group.location, note: group.note, createdAt: Date.now(), updatedAt: Date.now() };
        const req = pStore.add(pd);
        req.onsuccess = () => { const pid = req.result; for (const v of group.variants) { vStore.add({ productId: pid, size: v.size, stock: v.stock, createdAt: Date.now() }); } };
      }

      tx.oncomplete = () => { imported++; processBatch(idx + 1); };
      tx.onerror = () => { skipped++; processBatch(idx + 1); };
    }
    processBatch(0);
  } catch (err) { showToast('读取文件失败：' + err.message); }
});

// ============ Backup & Restore ============
async function exportBackup() {
  const data = { version: '2.0', exportedAt: Date.now(), products: await dbGetAll('products'), product_variants: await (async () => { try { return await dbGetAll('product_variants'); } catch(e) { return []; } })(), transactions: await dbGetAll('transactions'), categories: await dbGetAll('categories'), suppliers: await dbGetAll('suppliers'), settings: await dbGetAll('settings') };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '靴履云仓_备份_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('备份已下载', 'success');
}

async function restoreBackup() {
  if (!await confirm('恢复备份将覆盖当前所有数据。此操作不可撤销！\n建议先导出当前数据作为备份。', '恢复备份')) return;
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async function() {
    const file = this.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const data = JSON.parse(text);
      await dbClear('products'); await dbClear('product_variants'); await dbClear('transactions'); await dbClear('categories'); await dbClear('suppliers'); await dbClear('settings');
      const tx = db.transaction(['products', 'product_variants', 'transactions', 'categories', 'suppliers', 'settings'], 'readwrite');
      for (const p of (data.products || [])) tx.objectStore('products').put(p);
      for (const v of (data.product_variants || [])) tx.objectStore('product_variants').put(v);
      for (const t of (data.transactions || [])) tx.objectStore('transactions').put(t);
      for (const c of (data.categories || [])) tx.objectStore('categories').put(c);
      for (const s of (data.suppliers || [])) tx.objectStore('suppliers').put(s);
      for (const s of (data.settings || [])) tx.objectStore('settings').put(s);
      tx.oncomplete = () => { showToast('数据已恢复', 'success'); navigateTo('dashboard'); };
      tx.onerror = () => showToast('恢复失败');
    } catch (err) { showToast('读取备份失败：' + err.message); }
  };
  input.click();
}

// ============ JSON Share / Receive ============
async function shareJSON() {
  var data = {
    v: '2.0', t: Date.now(),
    products: await dbGetAll('products'),
    variants: await dbGetAll('product_variants'),
    transactions: await dbGetAll('transactions'),
    categories: await dbGetAll('categories'),
    suppliers: await dbGetAll('suppliers'),
    settings: await dbGetAll('settings')
  };
  var json = JSON.stringify(data);
  var blob = new Blob([json], { type: 'application/json' });
  var file = new File([blob], '靴履云仓_数据分享_' + new Date().toISOString().slice(0,10) + '.json', { type: 'application/json' });

  if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
    navigator.share({
      title: '靴履云仓数据',
      text: '靴履云仓同步数据文件',
      files: [file]
    }).then(function() {
      showToast('已分享', 'success');
    }).catch(function(err) {
      if (err.name !== 'AbortError') fallbackShare(json);
    });
  } else {
    fallbackShare(json);
  }
}

function fallbackShare(json) {
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '靴履云仓_数据分享_' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('文件已下载，请通过其他方式发送给对方', 'success');
}

async function receiveJSON() {
  var input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async function() {
    var file = input.files[0];
    if (!file) return;
    try {
      var text = await file.text();
      var data = JSON.parse(text);

      if (!data.products || typeof data.products !== 'object') {
        showToast('文件格式不正确，请确认是靴履云仓导出的数据文件');
        return;
      }

      await confirmAndImport(data);
    } catch (err) {
      showToast('读取文件失败: ' + err.message);
    }
  };
  input.click();
}

// ============ QR Sync - Send ============
async function showQRSyncSend() {
  // Strip photo fields to keep data small (photos are base64 and huge)
  var products = await dbGetAll('products');
  var variants = await dbGetAll('product_variants');
  var transactions = await dbGetAll('transactions');
  var categories = await dbGetAll('categories');
  var suppliers = await dbGetAll('suppliers');
  var settings = await dbGetAll('settings');

  // Remove photo fields from products and transactions
  products = products.map(function(p) { var o = {}; for (var k in p) { if (k !== 'photo') o[k] = p[k]; } return o; });
  transactions = transactions.map(function(t) { var o = {}; for (var k in t) { if (k !== 'photo') o[k] = t[k]; } return o; });

  // Also strip any large binary fields from variants
  variants = variants.map(function(v) { return { productId: v.productId, size: v.size, stock: v.stock, id: v.id }; });

  var data = { v: '2.0', t: Date.now(), products: products, variants: variants, transactions: transactions, categories: categories, suppliers: suppliers, settings: settings };
  var json = JSON.stringify(data);
  var jsonKB = (json.length / 1024).toFixed(1);

  // If data is small enough for a single QR code
  if (json.length <= 2500) {
    showQRSingle(json, jsonKB, '图片已剥离（数据不含照片），可扫码或复制');
    return;
  }

  // Compress and check
  var compressed = pako.deflate(json, { level: 9 });

  function uint8ToBase64(bytes) {
    var len = bytes.byteLength || bytes.length;
    var arr = new Uint8Array(bytes);
    var bin = '';
    var step = 4096;
    for (var i = 0; i < len; i += step) {
      var end = Math.min(i + step, len);
      bin += String.fromCharCode.apply(null, Array.prototype.slice.call(arr, i, end));
    }
    return btoa(bin);
  }
  var base64 = uint8ToBase64(compressed);
  var compKB = (compressed.length / 1024).toFixed(1);

  // Calculate pages needed
  var CHUNK_SIZE = 1200;
  var total = Math.ceil(base64.length / CHUNK_SIZE);

  // If more than 10 pages, offer copy-to-clipboard as primary method
  if (total > 10) {
    showQRCopyAlternative(json, jsonKB, compKB);
    return;
  }

  // Split into chunks for QR
  var chunks = [];
  for (var i = 0; i < base64.length; i += CHUNK_SIZE) {
    chunks.push(base64.slice(i, i + CHUNK_SIZE));
  }

  openModal('发送数据（已剥离照片）', `
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">${jsonKB}KB → ${compKB}KB 压缩 · 共 <b>${total}</b> 页。注：数据<b>不含商品照片</b>，如需同步照片请用备份功能。</p>
    <div style="text-align:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text-secondary)">第 </span>
      <span style="font-size:18px;font-weight:700;font-family:var(--font-mono)" id="qrPageNum">1</span>
      <span style="font-size:12px;color:var(--text-secondary)"> / ${total} 页</span>
    </div>
    <div style="text-align:center" id="qrContainer"></div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:center">
      <button class="btn btn-sm btn-secondary" id="qrPrevBtn" disabled>上一页</button>
      <button class="btn btn-sm btn-primary" id="qrNextBtn" ${total === 1 ? 'disabled' : ''}>下一页</button>
    </div>
  `, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');

  var currentPage = 0;
  function renderQR(idx) {
    var header = String.fromCharCode(48 + total) + String.fromCharCode(48 + idx);
    var text = header + chunks[idx];
    var container = $('#qrContainer');
    container.innerHTML = '';
    var img = document.createElement('img');
    img.style.display = 'block';
    img.style.margin = '0 auto';
    img.style.maxWidth = '100%';
    img.style.width = Math.min(300, window.innerWidth - 80) + 'px';
    img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(text);
    img.onerror = function() {
      img.src = 'https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=' + encodeURIComponent(text) + '&choe=UTF-8';
    };
    container.appendChild(img);
    $('#qrPageNum').textContent = idx + 1;
    $('#qrPrevBtn').disabled = idx === 0;
    $('#qrNextBtn').disabled = idx >= total - 1;
    currentPage = idx;
  }
  renderQR(0);

  $('#qrPrevBtn').addEventListener('click', function() { if (currentPage > 0) renderQR(currentPage - 1); });
  $('#qrNextBtn').addEventListener('click', function() { if (currentPage < total - 1) renderQR(currentPage + 1); });
}

function showQRSingle(json, jsonKB, note) {
  openModal('发送数据（已剥离照片）', `
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">${jsonKB}KB · 1 张二维码即可完成。注：数据<b>不含商品照片</b>。</p>
    <div style="text-align:center" id="qrContainer"></div>
  `, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');
  var container = $('#qrContainer');
  var img = document.createElement('img');
  img.style.display = 'block';
  img.style.margin = '0 auto';
  img.style.maxWidth = '100%';
  img.style.width = Math.min(300, window.innerWidth - 80) + 'px';
  // Direct JSON in a single QR (no compression needed for small data)
  var prefix = 'J'; // marker: direct JSON mode
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=' + encodeURIComponent(prefix + json);
  img.onerror = function() {
    img.src = 'https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=' + encodeURIComponent(prefix + json) + '&choe=UTF-8';
  };
  container.appendChild(img);
}

function showQRCopyAlternative(json, jsonKB, compKB) {
  // Use clipboard copy as the primary method
  openModal('数据过大（' + jsonKB + 'KB）', `
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.6">
      数据量较大超过二维码限制。建议使用以下方式之一：
    </p>
    <div class="card" style="background:var(--warning-light);margin-bottom:12px;font-size:12px;line-height:1.5">
      <b>方式一：复制数据文本</b><br>
      点击下方按钮复制全部同步数据。通过微信/QQ等发给对方，对方在「扫码同步 - 接收」中粘贴即可。
    </div>
    <button class="btn btn-primary btn-block" id="qrCopyBtn">复制同步数据</button>
    <div class="card" style="background:var(--bg);margin-top:12px;font-size:12px;line-height:1.5">
      <b>方式二：使用备份文件</b><br>
      在设置中点击「数据备份」导出 JSON 文件，发给对方后用「恢复备份」导入。备份包含完整数据（含照片）。
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--text-secondary);text-align:center">数据已压缩至 ${compKB}KB（剥离照片后通常 < 50KB）</div>
  `, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');

  $('#qrCopyBtn').addEventListener('click', function() {
    // Copy compressed base64 for sharing
    var compressed = pako.deflate(json, { level: 9 });
    function uint8ToBase64(bytes) {
      var len = bytes.byteLength || bytes.length;
      var arr = new Uint8Array(bytes);
      var bin = '';
      var step = 4096;
      for (var i = 0; i < len; i += step) {
        bin += String.fromCharCode.apply(null, Array.prototype.slice.call(arr, i, Math.min(i + step, len)));
      }
      return btoa(bin);
    }
    var text = 'SHOE_SYNC:' + uint8ToBase64(compressed);

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() {
        showToast('已复制（' + (text.length/1024).toFixed(1) + 'KB），发送给接收方', 'success');
      }).catch(function() {
        showAltCopy(text);
      });
    } else {
      showAltCopy(text);
    }
  });

  function showAltCopy(text) {
    openModal('手动复制', `
      <p style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">长按选中下方全部文本，复制后发给对方</p>
      <textarea readonly style="width:100%;height:120px;font-size:11px;font-family:monospace;padding:8px;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border)">${text}</textarea>
      <p style="font-size:11px;color:var(--text-secondary);margin-top:8px">对方收到后，在「扫码同步 - 接收」中点击「粘贴同步数据」按钮。</p>
    `, '<button class="btn btn-secondary" onclick="closeModal()">关闭</button>');
  }
}

let qrScanPieces = {};
let qrScanTotal = 0;
let qrScanCount = 0;

async function showQRSyncScan() {
  qrScanPieces = {};
  qrScanTotal = 0;
  qrScanCount = 0;

  openModal('扫码接收数据', `
    <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;line-height:1.5">
      使用相机扫描对方手机上的二维码。请按顺序从第 <b>1</b> 页开始扫描。扫描完成后自动合并数据。
    </p>

      <span style="font-size:14px;font-weight:600" id="qrScanStatus">等待扫描…</span>
    </div>
    <div style="position:relative;width:100%;max-width:320px;margin:0 auto;border-radius:var(--radius);overflow:hidden;background:#000">
      <video id="qrVideo" style="width:100%;display:block" autoplay playsinline></video>
    </div>
    <div style="text-align:center;margin-top:8px">
      <span style="font-size:12px;color:var(--text-secondary)">已接收：</span>
      <span style="font-size:16px;font-weight:700;font-family:var(--font-mono)" id="qrScanCount">0</span>
      <span style="font-size:12px;color:var(--text-secondary)" id="qrScanTotalLabel"></span>
    </div>
    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-sm btn-secondary" id="qrManualInputBtn">或手动输入二维码内容</button>
    </div>
    <div id="qrSyncStatus" style="margin-top:12px;text-align:center"></div>
  `, '<button class="btn btn-secondary" onclick="stopQRScan();closeModal()">取消</button>');

  startQRScanner();
}

function startQRScanner() {
  if (!('BarcodeDetector' in window)) {
    // Use legacy method: set up a hidden canvas-based reader
    // BarcodeDetector not available — use getUserMedia + manual approach
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(stream => {
          const video = $('#qrVideo');
          video.srcObject = stream;
          video.play();
          // Try to detect via jsQR if available, otherwise rely on manual input
          // Simple approach: we just show the camera as visual aid and rely on BarcodeDetector
          // If BarcodeDetector is not available, prompt manual input
          pollForBarcode(video, stream);
        })
        .catch(() => {
          showToast('无法访问相机，请使用手动输入');
          $('#qrVideo').parentElement.style.display = 'none';
        });
    }
  } else {
    // Modern browsers: use BarcodeDetector API
    detectWithBarcodeDetector();
  }
}

function pollForBarcode(video, stream) {
  // Since we can't use jsQR without adding it, fall back to manual input hint
  showToast('请使用手动输入按钮录入二维码内容');
}

async function detectWithBarcodeDetector() {
  const bd = new BarcodeDetector({ formats: ['qr_code'] });
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
  const video = $('#qrVideo');
  video.srcObject = stream;
  await video.play();

  let lastData = '';

  async function tick() {
    if (!video.srcObject) return;
    try {
      const barcodes = await bd.detect(video);
      for (const b of barcodes) {
        if (b.rawValue === lastData) continue;
        lastData = b.rawValue;
        processQRChunk(b.rawValue);
        await new Promise(r => setTimeout(r, 800)); // debounce
      }
    } catch(e) {}
    if ($('#modalOverlay').classList.contains('open')) {
      requestAnimationFrame(tick);
    } else {
      stream.getTracks().forEach(t => t.stop());
    }
  }
  tick();
}

function stopQRScan() {
  const video = $('#qrVideo');
  if (video && video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

function processQRChunk(raw) {
  if (raw.length < 1) return;

  // Check if it's direct JSON mode (starts with 'J')
  if (raw.charAt(0) === 'J') {
    // Direct JSON
    var json = raw.slice(1);
    processSyncJSON(json);
    return;
  }

  // Legacy multi-page mode
  if (raw.length < 2) return;
  const total = raw.charCodeAt(0) - 48;
  const index = raw.charCodeAt(1) - 48;
  const payload = raw.slice(2);

  if (qrScanTotal === 0) {
    qrScanTotal = total;
    $('#qrScanTotalLabel').textContent = ' / ' + total + ' 页';
  }

  if (!qrScanPieces[index]) {
    qrScanPieces[index] = payload;
    qrScanCount++;
    $('#qrScanCount').textContent = qrScanCount;
    showToast('已接收第 ' + (index + 1) + ' 页', 'success');

    if (qrScanCount >= qrScanTotal) {
      finishQRReceive();
    }
  }
}

async function processSyncJSON(jsonStr) {
  try {
    var data = JSON.parse(jsonStr);
    await confirmAndImport(data);
  } catch(err) {
    showToast('数据解析失败: ' + err.message);
  }
}

async function confirmAndImport(data) {
  if (!await confirm(
    '即将导入数据：\n- ' + (data.products?.length || 0) + ' 件商品\n- ' + (data.variants?.length || 0) + ' 个尺码\n- ' + (data.transactions?.length || 0) + ' 条记录\n\n这将<b>覆盖</b>当前所有数据。确认导入？',
    '同步确认'
  )) return;

  stopQRScan();
  if ($('#modalOverlay').classList.contains('open')) closeModal();

  await dbClear('products');
  await dbClear('product_variants');
  await dbClear('transactions');
  await dbClear('categories');
  await dbClear('suppliers');
  await dbClear('settings');

  var tx = db.transaction(['products', 'product_variants', 'transactions', 'categories', 'suppliers', 'settings'], 'readwrite');
  for (var i = 0; i < (data.products || []).length; i++) tx.objectStore('products').put(data.products[i]);
  for (var i = 0; i < (data.variants || []).length; i++) tx.objectStore('product_variants').put(data.variants[i]);
  for (var i = 0; i < (data.transactions || []).length; i++) tx.objectStore('transactions').put(data.transactions[i]);
  for (var i = 0; i < (data.categories || []).length; i++) tx.objectStore('categories').put(data.categories[i]);
  for (var i = 0; i < (data.suppliers || []).length; i++) tx.objectStore('suppliers').put(data.suppliers[i]);
  for (var i = 0; i < (data.settings || []).length; i++) tx.objectStore('settings').put(data.settings[i]);

  tx.oncomplete = function() {
    showToast('数据同步完成！（照片未同步）', 'success');
    qrScanPieces = {}; qrScanTotal = 0; qrScanCount = 0;
    navigateTo('dashboard');
  };
  tx.onerror = function() { showToast('同步失败'); };
}

async function finishQRReceive() {
  stopQRScan();
  if ($('#modalOverlay').classList.contains('open')) closeModal();

  var base64 = '';
  for (var i = 0; i < qrScanTotal; i++) {
    if (!qrScanPieces[i]) { showToast('数据不完整：缺少第 ' + (i + 1) + ' 页'); return; }
    base64 += qrScanPieces[i];
  }

  try {
    var compressed = Uint8Array.from(atob(base64), function(c) { return c.charCodeAt(0); });
    var json = pako.inflate(compressed, { to: 'string' });
    var data = JSON.parse(json);
    await confirmAndImport(data);
  } catch (err) {
    showToast('数据解析失败：' + err.message);
  }
}

// Manual input & paste for QR/receive data
document.addEventListener('click', function(e) {
  if (e.target.id === 'qrManualInputBtn') {
    e.stopPropagation();
    var raw = prompt('二维码内容，或粘贴对方发来的同步文本（以 SHOE_SYNC: 开头）：');
    if (raw && raw.trim()) {
      // Check if it's SHOE_SYNC clipboard data
      if (raw.indexOf('SHOE_SYNC:') === 0) {
        receiveClipboardSync(raw.slice(10));
      } else {
        processQRChunk(raw.trim());
      }
    }
  }
});

async function receiveClipboardSync(base64) {
  try {
    var compressed = Uint8Array.from(atob(base64), function(c) { return c.charCodeAt(0); });
    var json = pako.inflate(compressed, { to: 'string' });
    var data = JSON.parse(json);
    await confirmAndImport(data);
  } catch (err) {
    showToast('粘贴数据解析失败: ' + err.message);
  }
}

// ============ Photo ============
function handlePhotoPick(input, pickerId, dataId) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    $('#' + dataId).value = reader.result;
    const picker = $('#' + pickerId);
    picker.classList.add('has-photo');
    picker.innerHTML = '<img src="' + reader.result + '" alt=""><span class="photo-remove" onclick="event.stopPropagation();clearPhoto(\'' + pickerId + '\',\'' + dataId + '\')">✕</span>';
  };
  reader.readAsDataURL(file);
  input.value = '';
}

function clearPhoto(pickerId, dataId) {
  $('#' + dataId).value = '';
  const picker = $('#' + pickerId);
  picker.classList.remove('has-photo');
  picker.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span style="font-size:13px">点击拍照或选择图片</span>';
}

// ============ HTML escape ============
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ============ Service Worker ============
if ('serviceWorker' in navigator) {
  const swBlob = new Blob(["const CACHE='shoe-wh-v3';self.addEventListener('install',e=>{e.waitUntil(self.skipWaiting())});self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(k=>Promise.all(k.filter(x=>x!==CACHE).map(x=>caches.delete(x)))).then(()=>self.clients.claim()))});self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c))}return res})))})"], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}

async function init() {
  try {
    await openDB();
    await migrateOldData();
    navigateTo('dashboard');
    window.addEventListener('online', () => showToast('网络已连接', 'success'));
    window.addEventListener('offline', () => showToast('已离线，数据保存在本地'));
  } catch (err) {
    $('#mainContent').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><h3>初始化失败</h3><p>' + escHtml(err.message) + '。请尝试刷新页面。</p></div>';
  }
}
